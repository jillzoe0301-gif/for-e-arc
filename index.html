function renderPickupMaintenance(rows){return `<div class="section-title"><div><h2>領件狀況維護</h2><p class="hint">領件狀況與日期可手動修改；報備不製證與初辦項目不會列入領 IC 卡流程。</p></div><div class="toolbar"><button class="btn primary" onclick="selectAllPickup()">一鍵全選</button><button class="btn ghost" onclick="clearPickupSelection()">取消勾選</button><button class="btn success" onclick="batchSetPicked()">選取改已領件</button></div></div><div class="table-wrap"><table><thead><tr><th>領件維護</th><th>案件</th><th>仲介別</th><th>雇主</th><th>工人</th><th>申請項目</th><th>領件狀況</th><th>領件日</th><th>領件人</th></tr></thead><tbody>${rows.map(c=>`<tr><td><input type="checkbox" ${selectedPickup.has(c.id)?'checked':''} onchange="togglePickup('${c.id}',this.checked)"></td><td>${c.id}</td><td>${getAgency(c.agencyId).short}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${esc(c.item)}</td><td><select class="table-input" onchange="setPickup('${c.id}','pickupStatus',this.value)"><option value="WAIT" ${pickupStatus(c)==='WAIT'?'selected':''}>待領件</option><option value="PICKED" ${pickupStatus(c)==='PICKED'?'selected':''}>已領件</option><option value="HOLD" ${pickupStatus(c)==='HOLD'?'selected':''}>暫緩領件</option><option value="ISSUE" ${pickupStatus(c)==='ISSUE'?'selected':''}>異常/需確認</option></select></td><td><input class="table-input date" type="date" value="${c.pickupDate||''}" onchange="setPickup('${c.id}','pickupDate',this.value)"></td><td><select class="table-input" onchange="setPickup('${c.id}','pickupPerson',this.value)">${handlerOptions(c.pickupPerson||c.handler)}</select></td></tr>`).join('')}</tbody></table></div>`}
function setPickup(id,f,v){const c=getCase(id); if(!c)return; const before=clone(c); c[f]=v;createAudit('修改','pickup',id,before,clone(c),'修改領件欄位：'+f,false);saveState();showToast('已更新領件資料')}function batchSetPicked(){selectedPickup.forEach(id=>{const c=getCase(id);if(c){const before=clone(c);c.pickupStatus='PICKED';c.pickupDate=c.pickupDate||today;c.pickupPerson=c.pickupPerson||c.handler;createAudit('修改','pickup',id,before,clone(c),'批次改為已領件',false)}});saveState();render();showToast('已批次改為已領件')}
function renderSignPaper(rows){if(!rows.length)return '<div class="empty">請先勾選傳真領件資料，系統會同步產出簽收單</div>'; rows=[...rows].sort(compareSignRows); const adminsUsed=[...new Set(rows.map(c=>c.adminCategory||c.handler))]; return `<div class="sign-paper"><div class="paper-title">居留證領件簽收單</div><div class="paper-summary"><span>本次領件筆數：${rows.length}</span><span>總張數：${totalSheets(rows)}</span><span>排序：行政 ＞ 雇主</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>行政</th><th>繳費日</th><th>領件日</th><th>收件號</th><th>雇主</th><th>工人</th><th>入境日</th><th>張數</th></tr></thead><tbody>${rows.map((c,i)=>{const p=findPaymentByCase(c.id)||{};return `<tr><td>${i+1}</td><td>${esc(c.adminCategory||c.handler)}</td><td>${payDateForCase(c)}</td><td>${c.pickupDate||''}</td><td>${esc(p.receiptNo||'')}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.entryDate||''}</td><td class="center">${p.sheetCount||1}</td></tr>`}).join('')}</tbody></table></div><div class="divider"></div><div class="three-col">${adminsUsed.map(a=>`<div class="stat-card"><strong>${esc(a)}簽名：</strong><span class="chip">張數：${sheetsByAdmin(rows,a)}</span><div style="height:38px;border-bottom:1px solid #111;margin-top:14px"></div></div>`).join('')}</div></div>`}
function renderSearch(){let rows=activeCases().filter(c=>{const q=searchState.q.toLowerCase();return (!q||[c.id,c.employer,c.worker,c.groupNo,c.item,c.handler,getAgency(c.agencyId).short,c.paymentCancelReason||'',cancelStatusLabel(c)].join(' ').toLowerCase().includes(q))&&(searchState.agencyId==='ALL'||c.agencyId===searchState.agencyId)&&(searchState.handler==='ALL'||c.handler===searchState.handler)&&(searchState.pay==='ALL'||(searchState.pay==='PAID'&&isPaid(c.id))||(searchState.pay==='UNPAID'&&!isPaid(c.id)&&!isCanceled(c))||(searchState.pay==='CANCELED'&&isCanceled(c)))&&(searchState.pickup==='ALL'||pickupStatus(c)===searchState.pickup)&&(searchState.month==='ALL'||(c.applicationDate&&c.applicationDate.slice(0,7)===searchState.month))});return `<div class="card"><div class="section-title"><div><h2>案件查詢</h2><p class="hint">可搜尋雇主、工人、團號、收件號、申請項目與取消原因。</p></div></div><div class="row"><div class="field wide"><label>關鍵字</label><input value="${esc(searchState.q)}" oninput="searchState.q=this.value;render()" placeholder="雇主 / 工人 / 團號 / 項目 / 取消原因"></div><div class="field small"><label>仲介別</label><select onchange="searchState.agencyId=this.value;render()">${agencyFilterOptions(searchState.agencyId)}</select></div><div class="field small"><label>承辦</label><select onchange="searchState.handler=this.value;render()">${handlerFilterOptions(searchState.handler)}</select></div><div class="field small"><label>繳款</label><select onchange="searchState.pay=this.value;render()"><option value="ALL">全部</option><option value="PAID" ${searchState.pay==='PAID'?'selected':''}>已繳款</option><option value="UNPAID" ${searchState.pay==='UNPAID'?'selected':''}>待繳款</option><option value="CANCELED" ${searchState.pay==='CANCELED'?'selected':''}>取消案件</option></select></div></div><div class="divider"></div>${renderCaseTable(rows,true)}</div>`}
function renderCaseTable(rows,showPay){if(!rows.length)return '<div class="empty">沒有符合資料</div>';return `<div class="table-wrap"><table><thead><tr><th>案件編號</th><th>仲介別</th><th>承辦</th><th>雇主</th><th>工人</th><th>入境日</th><th>申請日</th><th>團號</th><th>申請項目</th><th class="right">金額</th><th>繳款</th><th>領件</th><th>取消原因</th><th>操作</th></tr></thead><tbody>${rows.map(c=>`<tr><td>${c.id}</td><td>${getAgency(c.agencyId).short}</td><td>${esc(c.handler)}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.entryDate||''}</td><td>${c.applicationDate||''}</td><td>${esc(c.groupNo)}</td><td>${esc(c.item)}</td><td class="right money">${isCanceled(c)?'—':money(c.amount)}</td><td>${statusPay(c)}</td><td>${statusPickup(c)}</td><td>${esc(c.paymentCancelReason||'')}</td><td>${showPay?`${isPaymentCanceled(c)?`<button class="btn ghost" onclick="restorePaymentCancel('${c.id}')">恢復待繳</button>`:''}<button class="btn danger" onclick="deleteCase('${c.id}')">刪除</button>`:''}</td></tr>`).join('')}</tbody></table></div>`}
function renderStats(){const m=statsState.month,y=statsState.year; const monthCases=normalCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,7)===m); const yearCases=normalCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,4)===y); const canceledMonth=canceledCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,7)===m); const canceledYear=canceledCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,4)===y); const handlerRows=admins().map(h=>{const count=monthCases.filter(c=>c.handler===h).length;return {h,count}}).filter(x=>x.count); const itemCounts={}; yearCases.forEach(c=>{itemCounts[c.item]=itemCounts[c.item]||{count:0,amount:0};itemCounts[c.item].count++;itemCounts[c.item].amount+=num(c.amount)}); const months=Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);return `<div class="grid"><div class="card span-12"><div class="row"><div class="field small"><label>月份</label><input type="month" value="${m}" onchange="statsState.month=this.value;render()"></div><div class="field small"><label>年度</label><input type="number" value="${y}" onchange="statsState.year=this.value;render()"></div></div></div><div class="card span-3"><div class="small-text">當月申請</div><div class="stat-card"><div class="big">${monthCaseTotal(m)}</div><div class="small-text">不含取消案件</div></div></div><div class="card span-3"><div class="small-text">當年申請</div><div class="stat-card"><div class="big">${yearCaseTotal(y)}</div><div class="small-text">不含取消案件</div></div></div><div class="card span-3"><div class="small-text">當月繳款</div><div class="stat-card"><div class="big money">${money(monthPaidTotal(m))}</div></div></div><div class="card span-3"><div class="small-text">取消案件</div><div class="stat-card"><div class="big">${monthCanceledTotal(m)}</div><div class="small-text">當年 ${yearCanceledTotal(y)} 件</div></div></div><div class="card span-6"><h2>每月每個人申請件數</h2>${handlerRows.length?handlerRows.map(x=>`<div class="progress-row"><span>${x.h}</span><div class="bar"><span style="width:${Math.min(100,x.count*18)}%"></span></div><strong class="right">${x.count}</strong></div>`).join(''):'<div class="empty">無資料</div>'}</div><div class="card span-6"><h2>各項申請數據</h2><div class="table-wrap"><table><thead><tr><th>項目</th><th class="right">件數</th><th class="right">金額</th></tr></thead><tbody>${Object.entries(itemCounts).map(([item,v])=>`<tr><td>${item}</td><td class="right">${v.count}</td><td class="right money">${money(v.amount)}</td></tr>`).join('')}</tbody></table></div></div><div class="card span-12"><h2>取消案件</h2><p class="hint">取消申請與取消繳費都會列在這裡；原金額保留參考，但不計入申請金額或繳款總額。</p>${renderCanceledCasesStats(canceledYear)}</div><div class="card span-12"><h2>各仲介每月 / 每年繳款總數</h2><div class="table-wrap"><table><thead><tr><th>仲介別</th><th class="right">當月件數</th><th class="right">當月總額</th><th class="right">當年件數</th><th class="right">當年總額</th></tr></thead><tbody>${activeAgencies().map(a=>{const ms=agencyPaymentStats(a.id,m),ys=agencyPaymentStats(a.id,y);return `<tr><td>${a.short}</td><td class="right">${ms.count}</td><td class="right money">${money(ms.amount)}</td><td class="right">${ys.count}</td><td class="right money">${money(ys.amount)}</td></tr>`}).join('')}</tbody></table></div></div><div class="card span-12"><h2>年度月份明細</h2><div class="table-wrap"><table><thead><tr><th>月份</th><th class="right">申請件數</th><th class="right">取消案件</th><th class="right">繳款批次</th><th class="right">繳款總額</th><th class="right">已領件</th><th class="right">待領件</th></tr></thead><tbody>${months.map(mm=>{const cs=normalCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,7)===mm),cancelled=canceledCases().filter(c=>c.applicationDate&&c.applicationDate.slice(0,7)===mm),ps=activePayments().filter(b=>b.date&&b.date.slice(0,7)===mm);return `<tr><td>${mm}</td><td class="right">${cs.length}</td><td class="right">${cancelled.length}</td><td class="right">${ps.length}</td><td class="right money">${money(monthPaidTotal(mm))}</td><td class="right">${cs.filter(c=>pickupStatus(c)==='PICKED').length}</td><td class="right">${cs.filter(c=>needsPickup(c)).length}</td></tr>`}).join('')}</tbody></table></div></div></div>`}
function renderCanceledCasesStats(rows){if(!rows.length)return '<div class="empty">此年度沒有取消案件</div>';return `<div class="table-wrap"><table><thead><tr><th>案件編號</th><th>取消類型</th><th>仲介別</th><th>承辦</th><th>雇主</th><th>工人</th><th>申請日</th><th>申請項目</th><th class="right">原金額</th><th>取消時間</th><th>取消原因</th></tr></thead><tbody>${rows.map(c=>`<tr><td>${c.id}</td><td>${cancelStatusLabel(c)}</td><td>${getAgency(c.agencyId).short}</td><td>${esc(c.handler)}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.applicationDate||''}</td><td>${esc(c.item)}</td><td class="right money">${money(c.amount)}</td><td>${esc(c.paymentCancelAt||'')}</td><td>${esc(c.paymentCancelReason||'')}</td></tr>`).join('')}</tbody></table></div>`}
function agencyPaymentStats(agencyId,period){let amount=0,count=0;activePayments().forEach(b=>{if(!b.date||!b.date.startsWith(period))return;let matched=false;b.details.forEach(d=>{const c=getCase(d.caseId);if(c&&c.agencyId===agencyId){amount+=num(d.amount);count++;matched=true}});const ac=getAccount(b.accountId);if(ac&&ac.agencyId===agencyId)amount+=num(b.fee)});return {amount,count}}
function renderAgencies(){const agencies=activeAgencies(),accounts=activeAccounts();return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>仲介、扣款帳號與餘額維護</h2><p class="hint">餘額卡不顯示電話；扣款帳號可複製、修改、手動改餘額或刪除。</p></div><button class="btn primary" onclick="addAccount()">新增扣款帳號</button></div><div class="three-col">${agencies.map(a=>`<div class="stat-card"><div class="small-text">${esc(a.name)}</div><div class="big">${esc(a.short)} <span class="small-text">${a.id}</span></div><div class="summary-line"><span>帳戶餘額合計</span><strong class="money">${money(totalBalanceByAgency(a.id))}</strong></div></div>`).join('')}</div></div><div class="card span-12"><h2>仲介資料可修改</h2><div class="table-wrap"><table><thead><tr><th>代碼</th><th>簡稱</th><th>公司全名</th><th>電話</th><th>操作</th></tr></thead><tbody>${agencies.map(a=>`<tr><td><strong>${a.id}</strong></td><td><input class="table-input short" id="agShort_${a.id}" value="${esc(a.short)}"></td><td><input class="table-input xlong" id="agName_${a.id}" value="${esc(a.name)}"></td><td><input class="table-input long" id="agPhone_${a.id}" value="${esc(a.phone||'')}"></td><td><button class="btn success" onclick="saveAgency('${a.id}')">儲存</button></td></tr>`).join('')}</tbody></table></div></div><div class="card span-12"><h2>扣款帳號可修改 / 複製 / 刪除</h2><div class="account-grid">${accounts.map(ac=>{const ag=getAgency(ac.agencyId);return `<div class="account-card"><h3>${ag.short}｜${ac.bank} ${ac.code}</h3><div class="small-text">帳號代碼：${ac.id}</div><div class="toolbar"><span class="copy-chip" onclick="copyText('${esc(ac.number)}')">複製 ${esc(ac.number)}</span><button class="btn ghost" onclick="copyText('${esc(ac.bank)}${esc(ac.code)} ${esc(ac.number)}')">複製銀行 + 帳號</button></div><div class="grid"><div class="field span-4"><label>所屬仲介</label><select id="acAgency_${ac.id}">${agencyOptions(ac.agencyId)}</select></div><div class="field span-4"><label>銀行</label><input id="acBank_${ac.id}" value="${esc(ac.bank)}"></div><div class="field span-4"><label>代碼</label><input id="acCode_${ac.id}" value="${esc(ac.code)}"></div><div class="field span-12"><label>帳號</label><input id="acNumber_${ac.id}" value="${esc(ac.number)}"></div><div class="field span-6"><label>備註</label><input id="acNote_${ac.id}" value="${esc(ac.note||'')}"></div><div class="field span-3"><label>目前餘額</label><input id="bal_${ac.id}" type="number" value="${balanceForAccount(ac.id)}"></div><div class="field span-3"><label>起算餘額</label><input disabled value="${money(ac.baseBalance)}"></div></div><div class="toolbar"><button class="btn success" onclick="saveAccount('${ac.id}')">儲存帳號</button><button class="btn" onclick="editBalance('${ac.id}')">儲存新餘額</button><button class="btn danger" onclick="deleteAccount('${ac.id}')">刪除扣款帳號</button></div></div>`}).join('')}</div></div></div>`}
function saveAgency(id){const a=getAgency(id);const before=clone(a);a.short=document.getElementById('agShort_'+id).value.trim()||a.short;a.name=document.getElementById('agName_'+id).value.trim()||a.name;a.phone=document.getElementById('agPhone_'+id).value.trim();createAudit('修改','agency',id,before,clone(a),'修改仲介資料',false);saveState();render();showToast('已儲存仲介資料')}
function saveAccount(id){const ac=getAccount(id);const before=clone(ac);ac.agencyId=document.getElementById('acAgency_'+id).value;ac.bank=document.getElementById('acBank_'+id).value.trim();ac.code=document.getElementById('acCode_'+id).value.trim();ac.number=document.getElementById('acNumber_'+id).value.trim();ac.note=document.getElementById('acNote_'+id).value.trim();createAudit('修改','account',id,before,clone(ac),'修改扣款帳號',false);saveState();render();showToast('已儲存扣款帳號')}
function editBalance(id){const ac=getAccount(id);const before=clone(ac);ac.baseBalance=num(document.getElementById('bal_'+id).value);ac.balanceEditedSeq=state.seq.confirm;createAudit('修改','account',id,before,clone(ac),'手動修改餘額',false);saveState();render();showToast('已手動修改餘額')}
function addAccount(){const id='AC_'+Date.now().toString().slice(-6),first=(activeAgencies()[0]&&activeAgencies()[0].id)||'FW';state.accounts[id]={id,agencyId:first,bank:'請填銀行',code:'',number:'',baseBalance:0,balanceEditedSeq:state.seq.confirm,note:'新增扣款帳號'};createAudit('新增','account',id,null,clone(state.accounts[id]),'新增扣款帳號',false);saveState();render();showToast('已新增扣款帳號')}
function deleteAccount(id){const used=activePayments().some(b=>b.accountId===id);if(used&&!confirm('此帳號已有繳費批次使用，確定仍要刪除？可由操作紀錄救回。'))return;markDeleted(state.accounts[id],'account',id,(state.accounts[id]||{}).number);saveState();render();showToast('已刪除扣款帳號，可由操作紀錄救回')}


function deleteCase(id){const c=getCase(id);if(!c)return;if(!confirm('確定刪除這筆案件？刪除後可由操作紀錄救回。'))return;markDeleted(c,'case',id,`${c.employer||''} ${c.worker||''}`);saveState();render();showToast('已刪除案件，可由操作紀錄救回')}
function deletePaymentBatch(id){if(!isAdmin()){showToast('只有管理員可以刪除批次');return}const b=state.payments.find(x=>x.id===id);if(!b)return;if(b.confirmed&&!confirm('此批次已財務確認，刪除後會影響統計與餘額，確定刪除？可由操作紀錄救回。'))return;if(!b.confirmed&&!confirm('確定刪除這個繳費批次？可由操作紀錄救回。'))return;markDeleted(b,'payment',id,id);saveState();render();showToast('已刪除繳費批次，可由操作紀錄救回')}
function accountingNameQueryText(){return String(accountingQuery.nameQ||'').trim().toLowerCase()}
function accountingDetailMatchesName(d){const q=accountingNameQueryText();if(!q)return true;const c=getCase(d.caseId)||{};return String(c.employer||'').toLowerCase().includes(q)||String(c.worker||'').toLowerCase().includes(q)}
function accountingBatchMatchesName(b){const q=accountingNameQueryText();if(!q)return true;return (b.details||[]).some(d=>accountingDetailMatchesName(d))}
function paymentBatchesByAccountingQuery(){return activePayments().filter(b=>(!accountingQuery.from||b.date>=accountingQuery.from)&&(!accountingQuery.to||b.date<=accountingQuery.to)&&(accountingQuery.status==='ALL'||(accountingQuery.status==='CONFIRMED'&&b.confirmed)||(accountingQuery.status==='UNCONFIRMED'&&!b.confirmed))&&accountingBatchMatchesName(b)).sort((a,b)=>String(a.date).localeCompare(String(b.date))||String(a.id).localeCompare(String(b.id)))}
function renderAccountingQuery(){const batches=paymentBatchesByAccountingQuery();const rows=[];batches.forEach(b=>b.details.filter(d=>accountingDetailMatchesName(d)).forEach((d,i)=>{const c=getCase(d.caseId)||{},ac=getAccount(b.accountId)||{},ag=getAgency(c.agencyId);rows.push({batchId:b.id,date:b.date,status:b.confirmed?'財務已確認':'待財務確認',agency:ag.short,account:`${ac.bank||''}${ac.code||''}`,payer:b.payer,employer:c.employer,worker:c.worker,entryDate:c.entryDate,receiptNo:d.receiptNo,item:c.item,amount:num(d.amount),fee:i===0?num(b.fee):0,total:num(d.amount)+(i===0?num(b.fee):0)})}));return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>會計批次查詢</h2><p class="hint">依日期查詢每批繳費確認狀況；可輸入雇主或工人名稱關鍵字，並與原本篩選條件一起使用。</p></div><div class="toolbar"><button class="btn ghost" onclick="exportAccountingQuery()">匯出查詢結果</button></div></div><div class="row"><div class="field small"><label>起始日期</label><input type="date" value="${accountingQuery.from}" onchange="accountingQuery.from=this.value;render()"></div><div class="field small"><label>結束日期</label><input type="date" value="${accountingQuery.to}" onchange="accountingQuery.to=this.value;render()"></div><div class="field wide"><label>雇主 / 工人名稱查詢</label><input value="${esc(accountingQuery.nameQ||'')}" placeholder="輸入雇主或工人名稱關鍵字" oninput="accountingQuery.nameQ=this.value;render()"></div><div class="field small"><label>顯示方式</label><select onchange="accountingQuery.mode=this.value;render()"><option value="batch" ${accountingQuery.mode==='batch'?'selected':''}>批次</option><option value="detail" ${accountingQuery.mode==='detail'?'selected':''}>個別明細</option></select></div><div class="field small"><label>確認狀態</label><select onchange="accountingQuery.status=this.value;render()"><option value="ALL" ${accountingQuery.status==='ALL'?'selected':''}>全部</option><option value="CONFIRMED" ${accountingQuery.status==='CONFIRMED'?'selected':''}>財務已確認</option><option value="UNCONFIRMED" ${accountingQuery.status==='UNCONFIRMED'?'selected':''}>待財務確認</option></select></div></div></div>${accountingQuery.mode==='batch'?`<div class="card span-12">${batches.length?renderPaymentBatches(batches,false):'<div class="empty">查無符合資料</div>'}</div>`:`<div class="card span-12"><h2>個別繳費明細</h2>${rows.length?renderAccountingDetailRows(rows):'<div class="empty">查無符合資料</div>'}</div>`}</div>`}
function renderAccountingDetailRows(rows){if(!rows.length)return '<div class="empty">沒有符合資料</div>';return `<div class="table-wrap"><table><thead><tr><th>批次</th><th>繳費日</th><th>狀態</th><th>仲介</th><th>帳號</th><th>繳款人</th><th>雇主</th><th>工人</th><th>入境日</th><th>收件號</th><th>申請項目</th><th class="right">金額</th><th class="right">手續費</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.batchId}</td><td>${r.date}</td><td>${r.status}</td><td>${r.agency}</td><td>${r.account}</td><td>${esc(r.payer)}</td><td>${esc(r.employer)}</td><td>${esc(r.worker)}</td><td>${r.entryDate||''}</td><td>${esc(r.receiptNo||'')}</td><td>${esc(r.item||'')}</td><td class="right money">${money(r.amount)}</td><td class="right money">${money(r.fee)}</td></tr>`).join('')}</tbody></table></div>`}
function renderContacts(){const rows=serviceStations.filter(s=>!contactQ||[s.name,s.address,s.phone,s.fax].join(' ').includes(contactQ));return `<div class="card"><div class="contact-toolbar"><div><h2>全省移民署服務站聯絡資訊</h2><p class="hint">資料來源：內政部移民署服務站頁面；正式版可做成可維護資料表。</p></div><div class="field mid"><input value="${esc(contactQ)}" oninput="contactQ=this.value;render()" placeholder="搜尋縣市 / 地址 / 電話"></div></div>${renderContactTable(rows)}</div>`}
function renderEnforcementContacts(){const rows=enforcementTeams.filter(s=>!taskforceQ||[s.name,s.address,s.phone,s.fax].join(' ').includes(taskforceQ));return `<div class="card"><div class="contact-toolbar"><div><h2>全省移民署專勤隊聯絡資訊</h2><p class="hint">資料來源：內政部移民署專勤隊頁面；正式版可做成可維護資料表。</p></div><div class="field mid"><input value="${esc(taskforceQ)}" oninput="taskforceQ=this.value;render()" placeholder="搜尋縣市 / 地址 / 電話"></div></div>${renderContactTable(rows)}</div>`}
function renderContactTable(rows){return `<div class="table-wrap"><table><thead><tr><th>單位</th><th>地址</th><th>電話</th><th>傳真</th><th>操作</th></tr></thead><tbody>${rows.map(s=>`<tr><td><strong>${s.name}</strong></td><td>${s.address}</td><td>${s.phone}</td><td>${s.fax}</td><td><button class="btn ghost" onclick="copyText('${esc(s.name)}　${esc(s.phone)}　傳真：${esc(s.fax)}')">複製</button></td></tr>`).join('')}</tbody></table></div>`}
function renderExport(){return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>匯出資料</h2><p class="hint">選擇年度、月份或日期後匯出 CSV；正式版可改為 Excel 或 PDF。</p></div><button class="btn primary" onclick="exportDataset()">匯出 CSV</button></div><div class="export-panel"><div class="field"><label>匯出資料</label><select onchange="exportState.type=this.value;render()"><option value="cases" ${exportState.type==='cases'?'selected':''}>案件資料</option><option value="paymentBatches" ${exportState.type==='paymentBatches'?'selected':''}>繳費批次</option><option value="paymentDetails" ${exportState.type==='paymentDetails'?'selected':''}>繳費明細</option><option value="pickup" ${exportState.type==='pickup'?'selected':''}>領件資料</option></select></div><div class="field"><label>期間類型</label><select onchange="exportState.scope=this.value;render()"><option value="year" ${exportState.scope==='year'?'selected':''}>年度</option><option value="month" ${exportState.scope==='month'?'selected':''}>月份</option><option value="date" ${exportState.scope==='date'?'selected':''}>日期</option></select></div><div class="field"><label>年度</label><input type="number" value="${exportState.year}" onchange="exportState.year=this.value;render()"></div><div class="field"><label>月份</label><input type="month" value="${exportState.month}" onchange="exportState.month=this.value;render()" ${exportState.scope==='year'?'disabled':''}></div><div class="field"><label>日期</label><input type="date" value="${exportState.date}" onchange="exportState.date=this.value;render()" ${exportState.scope!=='date'?'disabled':''}></div></div></div><div class="card span-12"><h2>預覽前 20 筆</h2>${renderExportPreview()}</div></div>`}
function matchExportDate(date){date=String(date||'');if(exportState.scope==='year')return date.slice(0,4)===String(exportState.year);if(exportState.scope==='month')return date.slice(0,7)===exportState.month;return date===exportState.date}
function exportRows(){let rows=[];if(exportState.type==='cases'){rows=activeCases().filter(c=>matchExportDate(c.applicationDate)).map(c=>({'案件編號':c.id,'仲介':getAgency(c.agencyId).short,'承辦':c.handler,'行政分類':c.adminCategory||c.handler,'雇主':c.employer,'工人':c.worker,'入境日':c.entryDate,'申請日':c.applicationDate,'團號':c.groupNo,'申請項目':c.item,'原金額':c.amount,'計入金額':isCanceled(c)?0:c.amount,'繳款狀態':statusTextPay(c),'領件狀態':statusTextPickup(c),'取消時間':c.paymentCancelAt||'','取消人員':c.paymentCancelBy||'','取消原因':c.paymentCancelReason||''}))}else if(exportState.type==='paymentBatches'){rows=activePayments().filter(b=>matchExportDate(b.date)).map(b=>{const ac=getAccount(b.accountId)||{},ag=getAgency(ac.agencyId);return {'批次編號':b.id,'繳費日期':b.date,'確認狀態':b.confirmed?'財務已確認':'待財務確認','仲介':ag.short,'扣款帳號':`${ac.bank||''}${ac.code||''} ${ac.number||''}`,'繳款人':b.payer,'明細件數':b.details.length,'明細金額':batchSubtotal(b),'手續費':b.fee,'總額':batchTotal(b)}})}else if(exportState.type==='paymentDetails'){activePayments().filter(b=>matchExportDate(b.date)).forEach(b=>b.details.forEach((d,i)=>{const c=getCase(d.caseId)||{},ac=getAccount(b.accountId)||{};rows.push({'批次編號':b.id,'繳費日期':b.date,'確認狀態':b.confirmed?'財務已確認':'待財務確認','仲介':getAgency(c.agencyId).short,'扣款帳號':`${ac.bank||''}${ac.code||''} ${ac.number||''}`,'繳款人':b.payer,'雇主':c.employer,'工人':c.worker,'入境日':c.entryDate,'收件號':d.receiptNo,'申請項目':c.item,'金額':d.amount,'手續費':i===0?b.fee:0})}))}else{rows=activeCases().filter(c=>matchExportDate(c.pickupDate||payDateForCase(c))).map(c=>{const p=findPaymentByCase(c.id)||{};return {'案件編號':c.id,'仲介':getAgency(c.agencyId).short,'承辦':c.handler,'行政分類':c.adminCategory||c.handler,'雇主':c.employer,'工人':c.worker,'入境日':c.entryDate,'繳費日':payDateForCase(c),'收件號':p.receiptNo||'','領件日':c.pickupDate||'','領件狀態':statusTextPickup(c),'張數':p.sheetCount||1}})}return rows}
function statusTextPickup(c){if(isCanceled(c))return cancelStatusLabel(c)||'取消案件';if(!isPaid(c.id))return '未繳費';if(isDownloadOnly(c))return '請至移民署線上下載居留證';const st=pickupStatus(c);return st==='PICKED'?'已領件':st==='HOLD'?'暫緩領件':st==='ISSUE'?'異常/需確認':'待領件'}
function statusTextPay(c){if(isPaymentCanceled(c))return '取消繳費';if(c&&isCancelItem(c.item))return '取消申請';if(isOnsite(c))return '現場送件';return isPaid(c.id)?'已繳款':'待繳款'}
function renderExportPreview(){const rows=exportRows().slice(0,20);if(!rows.length)return '<div class="empty">沒有符合資料</div>';const cols=Object.keys(rows[0]);return `<div class="table-wrap mini-table"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(r[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function downloadCsv(filename,rows){if(!rows.length){showToast('沒有資料可匯出');return}const cols=Object.keys(rows[0]);const csv='\ufeff'+[cols.join(','),...rows.map(r=>cols.map(c=>csvCell(r[c])).join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);document.body.removeChild(a);showToast('已匯出 CSV')}
function csvCell(v){const t=String(v??'');return /[",\n]/.test(t)?'"'+t.replace(/"/g,'""')+'"':t}
function exportDataset(){const rows=exportRows();const period=exportState.scope==='year'?exportState.year:(exportState.scope==='month'?exportState.month:exportState.date);downloadCsv(`ARC_${exportState.type}_${period}.csv`,rows)}
function exportAccountingQuery(){const batches=paymentBatchesByAccountingQuery();let rows=[];if(accountingQuery.mode==='batch'){rows=batches.map(b=>{const ac=getAccount(b.accountId)||{},ag=getAgency(ac.agencyId);return {'批次編號':b.id,'繳費日期':b.date,'確認狀態':b.confirmed?'財務已確認':'待財務確認','仲介':ag.short,'扣款帳號':`${ac.bank||''}${ac.code||''} ${ac.number||''}`,'繳款人':b.payer,'明細件數':b.details.length,'明細金額':batchSubtotal(b),'手續費':b.fee,'總額':batchTotal(b)}})}else{batches.forEach(b=>b.details.forEach((d,i)=>{const c=getCase(d.caseId)||{},ac=getAccount(b.accountId)||{};rows.push({'批次編號':b.id,'繳費日期':b.date,'確認狀態':b.confirmed?'財務已確認':'待財務確認','仲介':getAgency(c.agencyId).short,'扣款帳號':`${ac.bank||''}${ac.code||''} ${ac.number||''}`,'繳款人':b.payer,'雇主':c.employer,'工人':c.worker,'入境日':c.entryDate,'收件號':d.receiptNo,'申請項目':c.item,'金額':d.amount,'手續費':i===0?b.fee:0})}))}downloadCsv(`ARC_會計查詢_${accountingQuery.from}_${accountingQuery.to}.csv`,rows)}
function exportFaxSelected(){const rows=pendingFaxQueue().map(q=>({'傳真日期':q.faxDate||today,'預計領件日':q.expectedPickupDate||'','承辦':q.handler||'','收件編號':q.receiptNo||'','外字末五碼':q.outerCode||'','收據順序':q.receiptOrder||'','工人姓名':q.worker||'','雇主名稱':q.employer||'','申請項目':q.item||'','狀態':q.status||'待領件'}));downloadCsv(`ARC_預計領件區_${today}.csv`,rows)}
function printArea(id,title){const el=document.getElementById(id);if(!el){showToast('找不到列印區塊');return}const win=window.open('','_blank','width=1100,height=800');if(!win){showToast('瀏覽器封鎖彈出視窗，請允許後再列印');return}win.document.write(`<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><title>${esc(title||'列印')}</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;color:#253041;margin:18px;font-size:12px}h1,h2,.paper-title{text-align:center;font-size:18px;margin:0 0 10px}.table-wrap{overflow:visible}table{width:100%;border-collapse:collapse}th,td{border:1px solid #cfd7e6;padding:5px 6px;text-align:left;vertical-align:middle;font-size:12px}th{background:#f3f6fa}.center{text-align:center}.right{text-align:right}.divider{height:1px;background:#ddd;margin:12px 0}.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat-card{border:1px solid #cfd7e6;border-radius:8px;padding:10px}.empty{display:none}.paper-summary{display:flex;justify-content:space-between;align-items:center;margin:8px 0 10px;font-weight:900;color:#27548A}.page-break{break-before:page;page-break-before:always;height:0;margin:0;padding:0}@page{size:A4 portrait;margin:9mm}</style></head><body>${el.innerHTML}</body></html>`);win.document.close();win.focus();setTimeout(()=>{win.print();},250)}


function auditRows(){const q=(auditQuery.q||'').toLowerCase();return (state.auditLogs||[]).filter(l=>(auditQuery.action==='ALL'||l.action===auditQuery.action)&&(auditQuery.target==='ALL'||l.targetType===auditQuery.target)&&(!q||[l.id,l.time,l.user,l.action,targetTypeLabel(l.targetType),l.targetId,l.note,JSON.stringify(l.before||''),JSON.stringify(l.after||'')].join(' ').toLowerCase().includes(q)))}
function renderLogs(){const rows=auditRows();const deleted=(state.auditLogs||[]).filter(l=>l.restorable&&!l.restored);return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>操作紀錄 / 資料救回</h2><p class="hint">新增、修改、刪除、會計確認、領件異動都會留下紀錄；刪除不是真刪除，可從這裡救回。</p></div><div class="chips"><span class="chip">尚可救回 ${deleted.length} 筆</span><span class="chip warn">操作者：${esc(currentOperator())}</span></div></div><div class="row"><div class="field wide"><label>搜尋</label><input value="${esc(auditQuery.q)}" oninput="auditQuery.q=this.value;render()" placeholder="搜尋案件、雇主、工人、帳號、操作者"></div><div class="field small"><label>動作</label><select onchange="auditQuery.action=this.value;render()"><option value="ALL" ${auditQuery.action==='ALL'?'selected':''}>全部</option><option value="新增" ${auditQuery.action==='新增'?'selected':''}>新增</option><option value="修改" ${auditQuery.action==='修改'?'selected':''}>修改</option><option value="刪除" ${auditQuery.action==='刪除'?'selected':''}>刪除</option><option value="救回" ${auditQuery.action==='救回'?'selected':''}>救回</option><option value="重置" ${auditQuery.action==='重置'?'selected':''}>重置</option></select></div><div class="field small"><label>資料類型</label><select onchange="auditQuery.target=this.value;render()"><option value="ALL" ${auditQuery.target==='ALL'?'selected':''}>全部</option><option value="case" ${auditQuery.target==='case'?'selected':''}>案件</option><option value="payment" ${auditQuery.target==='payment'?'selected':''}>繳費批次</option><option value="paymentDetail" ${auditQuery.target==='paymentDetail'?'selected':''}>繳費明細</option><option value="pickup" ${auditQuery.target==='pickup'?'selected':''}>領件資料</option><option value="account" ${auditQuery.target==='account'?'selected':''}>扣款帳號</option><option value="agency" ${auditQuery.target==='agency'?'selected':''}>仲介</option><option value="admin" ${auditQuery.target==='admin'?'selected':''}>行政/承辦</option><option value="user" ${auditQuery.target==='user'?'selected':''}>帳號</option><option value="setting" ${auditQuery.target==='setting'?'selected':''}>系統設定</option></select></div></div></div><div class="card span-12 restore-card"><h2>可救回資料</h2>${renderRestoreList(deleted)}</div><div class="card span-12"><h2>完整操作紀錄</h2>${renderAuditTable(rows)}</div></div>`}
function renderRestoreList(rows){if(!rows.length)return '<div class="empty">目前沒有被刪除且尚未救回的資料</div>';return `<div class="table-wrap"><table><thead><tr><th>時間</th><th>操作者</th><th>類型</th><th>資料</th><th>備註</th><th>操作</th></tr></thead><tbody>${rows.map(l=>`<tr class="deleted-row"><td>${esc(l.time)}</td><td>${esc(l.user)}</td><td>${targetTypeLabel(l.targetType)}</td><td>${esc(l.targetId)}</td><td>${esc(l.note||'')}</td><td>${isAdmin()?`<button class="btn success" onclick="restoreFromLog('${l.id}')">救回</button>`:'<span class="status gray">限管理員</span>'}</td></tr>`).join('')}</tbody></table></div>`}
function renderAuditTable(rows){if(!rows.length)return '<div class="empty">沒有符合的操作紀錄</div>';return `<div class="table-wrap"><table><thead><tr><th>時間</th><th>操作者</th><th>動作</th><th>類型</th><th>資料</th><th>備註</th><th>修改前 / 修改後</th></tr></thead><tbody>${rows.map(l=>`<tr class="audit-row"><td>${esc(l.time)}</td><td>${esc(l.user)}</td><td><span class="status ${l.action==='刪除'?'red':(l.action==='新增'?'green':(l.action==='救回'?'purple':'blue'))}">${esc(l.action)}</span></td><td>${targetTypeLabel(l.targetType)}</td><td>${esc(l.targetId)}</td><td>${esc(l.note||'')}${l.restored?' <span class="status green">已救回</span>':''}</td><td><details><summary>查看</summary><pre class="audit-pre">修改前：\n${esc(auditText(l.before))}\n\n修改後：\n${esc(auditText(l.after))}</pre></details></td></tr>`).join('')}</tbody></table></div>`}
function restoreFromLog(logId){const log=(state.auditLogs||[]).find(l=>l.id===logId);if(!log||!log.restorable||log.restored){showToast('這筆資料無法救回或已救回');return}const data=clearDeleteFields(clone(log.before||log.after));let restored=null;if(log.targetType==='case'){const i=state.cases.findIndex(c=>c.id===log.targetId);if(i>=0)state.cases[i]=data;else state.cases.unshift(data);restored=state.cases.find(c=>c.id===log.targetId)}else if(log.targetType==='payment'){const i=state.payments.findIndex(b=>b.id===log.targetId);if(i>=0)state.payments[i]=data;else state.payments.unshift(data);restored=state.payments.find(b=>b.id===log.targetId)}else if(log.targetType==='account'){state.accounts[log.targetId]=data;restored=state.accounts[log.targetId]}else if(log.targetType==='agency'){state.agencies[log.targetId]=data;restored=state.agencies[log.targetId]}else if(log.targetType==='admin'){const name=log.targetId;if(!state.admins.includes(name))state.admins.push(name);restored={name}}else if(log.targetType==='user'){const i=(state.users||[]).findIndex(u=>u.email===log.targetId||u.id===data.id);if(i>=0)state.users[i]=data;else state.users.push(data);restored=(state.users||[]).find(u=>u.email===log.targetId||u.id===data.id)}else{showToast('此類型目前無法自動救回');return}log.restored=true;log.restoreTime=nowText();log.restoreUser=currentOperator();createAudit('救回',log.targetType,log.targetId,null,clone(restored),'由操作紀錄救回',false);saveState();render();showToast('已救回資料')}
function saveDefaultFee(){const before={defaultFee:state.defaultFee};state.defaultFee=num(setFee.value);paymentCommon.fee=state.defaultFee;createAudit('修改','setting','defaultFee',before,{defaultFee:state.defaultFee},'修改預設手續費',false);saveState();render();showToast('已儲存手續費')}
function saveCurrentUser(){const before={currentUser:state.currentUser};state.currentUser=(document.getElementById('currentUserName').value||'未指定').trim()||'未指定';localStorage.setItem('arc_v13_current_user',state.currentUser);createAudit('修改','setting','currentUser',before,{currentUser:state.currentUser},'修改目前操作者',false);saveState();render();showToast('已更新目前操作者')}

function renderSettings(){const list=admins();return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>帳號權限管理</h2><p class="hint">可新增 Email 帳號、修改密碼與角色，並可停用或刪除帳號。被刪除的帳號可由操作紀錄救回。</p></div><div class="chips"><span class="chip">管理員：全部權限</span><span class="chip">行政：不可操作仲介/設定/會計</span><span class="chip">會計：會計對帳/查詢/修改餘額</span><span class="chip">帳號可綁定個人</span></div></div>${renderUserManagement()}</div><div class="card span-12"><div class="section-title"><div><h2>申請項目維護</h2><p class="hint">申請項目可新增、修改、刪除；取消申請不會進入待繳案件或待領案件。</p></div><button class="btn primary" onclick="addApplicationItem()">新增申請項目</button></div>${renderItemManagement()}</div><div class="card span-12"><div class="section-title"><div><h2>行政 / 承辦選項維護</h2><p class="hint">改成精簡排列，不佔版面；修改後同步更新既有資料。刪除行政會留下紀錄，可在操作紀錄救回行政選項。</p></div><button class="btn primary" onclick="addAdmin()">新增行政</button></div><div class="admin-list">${list.map((n,i)=>`<div class="admin-row"><div><label>名稱</label><input id="adminName_${i}" value="${esc(n)}"></div><button class="btn success" onclick="saveAdmin(${i})">儲存</button><button class="btn danger" onclick="deleteAdmin(${i})">刪除</button></div>`).join('')}</div></div><div class="card span-6"><h2>基本設定</h2><div class="row"><div class="field"><label>登入者</label><input disabled value="${esc(currentOperator())}"></div></div><div class="divider"></div><div class="row"><div class="field"><label>預設手續費</label><input id="setFee" type="number" value="${state.defaultFee}"></div><button class="btn success" onclick="saveDefaultFee()">儲存</button></div></div><div class="card span-6"><h2>Demo 資料</h2><p class="hint">樣式版使用瀏覽器暫存；正式版會寫入資料庫。重置會保留操作紀錄。</p><button class="btn danger" onclick="resetDemo()">重置 Demo 資料</button></div></div>`}

function renderItemManagement(){const list=appItems();return `<div class="admin-list">${list.map((n,i)=>`<div class="admin-row"><div><label>項目名稱</label><input id="itemName_${i}" value="${esc(n)}"></div><button class="btn success" onclick="saveApplicationItem(${i})">儲存</button><button class="btn danger" onclick="deleteApplicationItem(${i})">刪除</button></div>`).join('')}</div><div class="small-text" style="margin-top:8px">預設申請明細：新入境初次（紙本）、新入境展延（卡式）、續聘展延、承接展延、換護照展延、報備不製證、遺失補發、資料異動、中階居留證、雙語居留證、取消申請。</div>`}
function addApplicationItem(){const before=clone(appItems());state.items=[...appItems(),'新申請項目'];state.itemsVersion=2;createAudit('新增','setting','applicationItems',before,clone(state.items),'新增申請項目',false);saveState();render();showToast('已新增申請項目')}
function saveApplicationItem(i){const arr=[...appItems()];const old=arr[i];const nw=(document.getElementById('itemName_'+i)?.value||'').trim();if(!nw){showToast('申請項目不可空白');return}if(arr.some((x,idx)=>idx!==i&&x===nw)){showToast('申請項目名稱重複');return}const before={items:clone(arr),cases:clone(state.cases)};arr[i]=nw;state.items=arr;state.itemsVersion=2;state.cases.forEach(c=>{if(c.item===old)c.item=nw});createAudit('修改','setting','applicationItems',before,{items:clone(state.items),oldName:old,newName:nw},'修改申請項目並同步既有案件',false);saveState();render();showToast('已儲存申請項目')}
function deleteApplicationItem(i){const arr=[...appItems()];if(arr.length<=1){showToast('至少保留一個申請項目');return}const old=arr[i];if(!confirm('確定刪除此申請項目？既有案件會保留原項目文字，但新增時不再出現。'))return;const before=clone(arr);arr.splice(i,1);state.items=arr;state.itemsVersion=2;createAudit('刪除','setting','applicationItems',before,clone(state.items),'刪除申請項目選項',false);saveState();render();showToast('已刪除申請項目')}
function roleOptions(sel='office'){return Object.entries(roleLabels).map(([k,v])=>`<option value="${k}" ${k===sel?'selected':''}>${v}</option>`).join('')}
function personOptions(sel=''){normalizeState(state);const userPeople=(state.users||[]).map(u=>u.person||u.name).filter(Boolean);const values=[...new Set(['',...admins(),...userPeople,sel].filter(v=>v!==undefined&&v!==null))];return values.map(v=>`<option value="${esc(v)}" ${v===sel?'selected':''}>${v?esc(v):'未綁定'}</option>`).join('')}
function renderUserManagement(){const users=activeUsers();return `<div class="table-wrap"><table><thead><tr><th>Email</th><th>名稱</th><th>綁定個人</th><th>角色</th><th>狀態</th><th>新密碼</th><th>操作</th></tr></thead><tbody>${users.map(u=>`<tr><td><input class="table-input user-table-input" id="uEmail_${u.id}" value="${esc(u.email)}"></td><td><input class="table-input user-table-input" id="uName_${u.id}" value="${esc(u.name)}"></td><td><select class="table-input" id="uPerson_${u.id}">${personOptions(u.person||'')}</select></td><td><select class="table-input" id="uRole_${u.id}">${roleOptions(u.role)}</select></td><td>${u.active?'<span class="status green">啟用</span>':'<span class="status gray">停用</span>'}</td><td><input class="table-input user-password-input" id="uPass_${u.id}" type="password" placeholder="不修改留空"></td><td><button class="btn success" onclick="saveSystemUser('${u.id}')">儲存</button><button class="btn warn" onclick="toggleSystemUser('${u.id}')">${u.active?'停用':'啟用'}</button><button class="btn danger" onclick="deleteSystemUser('${u.id}')">刪除</button></td></tr>`).join('')}<tr><td><input class="table-input user-table-input" id="newUserEmail" placeholder="email@example.com"></td><td><input class="table-input user-table-input" id="newUserName" placeholder="姓名"></td><td><select class="table-input" id="newUserPerson">${personOptions('')}</select></td><td><select class="table-input" id="newUserRole">${roleOptions('office')}</select></td><td><span class="status blue">新帳號</span></td><td><input class="table-input user-password-input" id="newUserPassword" type="password" placeholder="密碼"></td><td><button class="btn primary" onclick="addSystemUser()">新增帳號</button></td></tr></tbody></table></div>`}
function findUserById(id){normalizeState(state);return (state.users||[]).find(u=>u.id===id)}
async function addSystemUser(){const email=(document.getElementById('newUserEmail')?.value||'').trim().toLowerCase();const name=(document.getElementById('newUserName')?.value||'').trim();const person=(document.getElementById('newUserPerson')?.value||'').trim();const role=document.getElementById('newUserRole')?.value||'office';const password=document.getElementById('newUserPassword')?.value||'';if(!email||!password||!name){showToast('請填 Email、姓名與密碼');return}if(formalMode){try{const {data,error}=await supabaseClient.rpc('arc_admin_create_user',{p_token:sessionToken(),p_email:email,p_password:password,p_name:name,p_person:person,p_role:role});if(error)throw error;if(!data||data.ok===false){showToast((data&&data.message)||'新增帳號失敗');return}await remoteReloadUsers();createAudit('新增','user',email,null,{email,name,person,role},'新增登入帳號並設定綁定個人',false);saveState();render();showToast('已新增帳號');return}catch(e){showToast('新增帳號失敗：'+(e.message||e));return}}if(activeUsers().some(u=>String(u.email).toLowerCase()===email)){showToast('Email 已存在');return}state.seq.user=(state.seq.user||defaultUsers.length)+1;const user={id:'USR-'+String(state.seq.user).padStart(3,'0'),email,password,name,person,role,active:true,createdAt:nowText(),createdBy:currentOperator()};state.users.push(user);createAudit('新增','user',email,null,clone({...user,password:'***'}),'新增登入帳號並設定綁定個人',false);saveState();render();showToast('已新增帳號')}
async function saveSystemUser(id){const u=findUserById(id);if(!u)return;const before=clone({...u,password:'***'});const email=(document.getElementById('uEmail_'+id)?.value||'').trim().toLowerCase();const name=(document.getElementById('uName_'+id)?.value||'').trim();const person=(document.getElementById('uPerson_'+id)?.value||'').trim();const role=document.getElementById('uRole_'+id)?.value||u.role;const pass=document.getElementById('uPass_'+id)?.value||'';if(!email||!name){showToast('Email 與名稱不可空白');return}if(formalMode){try{const {data,error}=await supabaseClient.rpc('arc_admin_update_user',{p_token:sessionToken(),p_user_id:id,p_email:email,p_password:pass,p_name:name,p_person:person,p_role:role,p_active:u.active!==false});if(error)throw error;if(!data||data.ok===false){showToast((data&&data.message)||'儲存帳號失敗');return}await remoteReloadUsers();createAudit('修改','user',email,before,{id,email,name,person,role,active:u.active!==false},'修改登入帳號 / 密碼 / 權限 / 綁定個人',false);saveState();render();showToast('已儲存帳號');return}catch(e){showToast('儲存帳號失敗：'+(e.message||e));return}}if(activeUsers().some(x=>x.id!==id&&String(x.email).toLowerCase()===email)){showToast('Email 已被其他帳號使用');return}u.email=email;u.name=name;u.person=person;u.role=role;if(pass)u.password=pass;createAudit('修改','user',u.email,before,clone({...u,password:'***'}),'修改登入帳號 / 密碼 / 權限 / 綁定個人',false);saveState();render();showToast('已儲存帳號')}
async function toggleSystemUser(id){const u=findUserById(id);if(!u)return;if(currentUser()?.id===id){showToast('不能停用目前登入中的帳號');return}const before=clone({...u,password:'***'});if(formalMode){try{const {data,error}=await supabaseClient.rpc('arc_admin_set_user_active',{p_token:sessionToken(),p_user_id:id,p_active:!(u.active!==false)});if(error)throw error;if(!data||data.ok===false){showToast((data&&data.message)||'更新帳號狀態失敗');return}await remoteReloadUsers();createAudit('修改','user',u.email,before,{...before,active:!(u.active!==false)},(u.active!==false)?'停用帳號':'啟用帳號',false);saveState();render();showToast((u.active!==false)?'已停用帳號':'已啟用帳號');return}catch(e){showToast('更新帳號狀態失敗：'+(e.message||e));return}}u.active=!u.active;createAudit('修改','user',u.email,before,clone({...u,password:'***'}),u.active?'啟用帳號':'停用帳號',false);saveState();render();showToast(u.active?'已啟用帳號':'已停用帳號')}
async function deleteSystemUser(id){const u=findUserById(id);if(!u)return;if(currentUser()?.id===id){showToast('不能刪除目前登入中的帳號');return}if(!confirm('確定刪除這個帳號？可由操作紀錄救回。'))return;const before=clone(u);if(formalMode){try{const {data,error}=await supabaseClient.rpc('arc_admin_delete_user',{p_token:sessionToken(),p_user_id:id});if(error)throw error;if(!data||data.ok===false){showToast((data&&data.message)||'刪除帳號失敗');return}await remoteReloadUsers();createAudit('刪除','user',u.email,before,null,'刪除登入帳號',true);saveState();render();showToast('已刪除帳號');return}catch(e){showToast('刪除帳號失敗：'+(e.message||e));return}}markDeleted(u,'user',u.email,u.email);saveState();render();showToast('已刪除帳號，可由操作紀錄救回')}
function addAdmin(){const before=clone(admins());state.admins=[...admins(),'新行政'];createAudit('新增','admin','新行政',before,clone(state.admins),'新增行政/承辦選項',false);saveState();render()}function saveAdmin(i){const arr=[...admins()],old=arr[i],nw=(document.getElementById('adminName_'+i).value||'').trim();if(!nw){showToast('名稱不可空白');return}const before={admins:clone(arr),cases:clone(state.cases),payments:clone(state.payments)};arr[i]=nw;state.admins=arr;state.cases.forEach(c=>{if(c.handler===old)c.handler=nw;if(c.adminCategory===old)c.adminCategory=nw;if(c.pickupPerson===old)c.pickupPerson=nw});state.payments.forEach(b=>{if(b.payer===old)b.payer=nw;b.details.forEach(d=>{if(d.responsible===old)d.responsible=nw})});createAudit('修改','admin',old,before,{admins:clone(state.admins),newName:nw},'修改行政/承辦名稱並同步既有資料',false);saveState();render();showToast('已更新行政名稱')}function deleteAdmin(i){const arr=[...admins()];if(arr.length<=1){showToast('至少保留一位');return}const old=arr[i];if(!confirm('確定刪除行政選項？可由操作紀錄救回。'))return;const before={admins:clone(arr),cases:clone(state.cases)};arr.splice(i,1);const fallback=arr[0];state.admins=arr;state.cases.forEach(c=>{if(c.handler===old)c.handler=fallback;if(c.adminCategory===old)c.adminCategory=fallback;if(c.pickupPerson===old)c.pickupPerson=fallback});state.deletedAdmins=state.deletedAdmins||[];state.deletedAdmins.push({name:old,deletedAt:nowText(),deletedBy:currentOperator()});createAudit('刪除','admin',old,before,{admins:clone(state.admins),fallback},'刪除行政選項，既有案件改指派到第一位行政',true);saveState();render();showToast('已刪除行政選項，可由操作紀錄救回')}
currentPage='dashboard';boot();
