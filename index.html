function migrateIdRule(s){
  if(!s||s.idRuleVersion>=2)return s;
  const oldCaseIds=(s.cases||[]).map(c=>c.id).join(', ');
  const oldPaymentIds=(s.payments||[]).map(b=>b.id).join(', ');
  const caseMap={};
  const caseCounters={};
  (s.cases||[]).slice().sort((a,b)=>String(a.applicationDate||'').localeCompare(String(b.applicationDate||''),'zh-Hant')||String(a.agencyId||'').localeCompare(String(b.agencyId||''),'zh-Hant')||String(a.id||'').localeCompare(String(b.id||''),'zh-Hant',{numeric:true})).forEach(c=>{
    const oldId=c.id;
    const prefix=makeCasePrefix(c.applicationDate||today,c.agencyId||'XX');
    caseCounters[prefix]=(caseCounters[prefix]||0)+1;
    const nextId=prefix+String(caseCounters[prefix]).padStart(3,'0');
    c.id=nextId;
    if(oldId)caseMap[oldId]=nextId;
  });
  (s.payments||[]).forEach(b=>(b.details||[]).forEach(d=>{if(caseMap[d.caseId])d.caseId=caseMap[d.caseId]}));
  const paymentMap={};
  const paymentCounters={};
  (s.payments||[]).slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||''),'zh-Hant')||String(a.id||'').localeCompare(String(b.id||''),'zh-Hant',{numeric:true})).forEach(b=>{
    const oldId=b.id;
    const ac=(s.accounts||{})[b.accountId]||{};
    const firstDetail=(b.details||[])[0];
    const firstCase=firstDetail?(s.cases||[]).find(c=>c.id===firstDetail.caseId):null;
    const agencyId=ac.agencyId||(firstCase&&firstCase.agencyId)||'XX';
    const prefix=makePaymentPrefix(b.date||today,agencyId);
    paymentCounters[prefix]=(paymentCounters[prefix]||0)+1;
    const nextId=prefix+String(paymentCounters[prefix]).padStart(3,'0');
    b.id=nextId;
    if(oldId)paymentMap[oldId]=nextId;
  });
  (s.auditLogs||[]).forEach(log=>{if(log.targetType==='case'&&caseMap[log.targetId])log.targetId=caseMap[log.targetId];if(log.targetType==='payment'&&paymentMap[log.targetId])log.targetId=paymentMap[log.targetId]});
  s.idRuleVersion=2;
  if((s.auditLogs||[]).length){
    s.seq=s.seq||{};s.seq.audit=s.seq.audit||0;s.seq.audit+=1;
    s.auditLogs.unshift({id:'LOG-'+String(s.seq.audit).padStart(5,'0'),time:nowText(),user:'系統',action:'系統調整',targetType:'system',targetId:'idRuleV2',before:{案件編號:oldCaseIds,批次編號:oldPaymentIds},after:{案件編號:(s.cases||[]).map(c=>c.id).join(', '),批次編號:(s.payments||[]).map(b=>b.id).join(', ')},note:'案件編號改為 ARC+仲介代碼+西元年月日+001；批次編號改為 仲介代碼+西元年月日+001',restorable:false,restored:false});
  }
  return s;
}

function normalizeDateInputValue(v){
  const raw=String(v||'').trim();
  if(!raw)return '';
  const digits=raw.replace(/\D/g,'');
  if(/^\d{8}$/.test(digits)){
    const y=digits.slice(0,4),m=digits.slice(4,6),d=digits.slice(6,8);
    const iso=`${y}-${m}-${d}`;
    const dt=new Date(iso+'T00:00:00');
    if(!isNaN(dt)&&dt.getFullYear()==Number(y)&&dt.getMonth()+1==Number(m)&&dt.getDate()==Number(d))return iso;
  }
  const m=raw.match(/^(\d{4})[-/.年](\d{1,2})[-/.月](\d{1,2})日?$/);
  if(m){
    const y=m[1],mo=String(Number(m[2])).padStart(2,'0'),d=String(Number(m[3])).padStart(2,'0');
    const iso=`${y}-${mo}-${d}`;
    const dt=new Date(iso+'T00:00:00');
    if(!isNaN(dt)&&dt.getFullYear()==Number(y)&&dt.getMonth()+1==Number(mo)&&dt.getDate()==Number(d))return iso;
  }
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw))return raw;
  return '';
}

function syncBatchRowsFromDom(){

    const id=Number(el.getAttribute('data-batch-row'));
    const field=el.getAttribute('data-batch-field');

function pasteBatchCells(evt,rowId,field){
  const text=(evt.clipboardData||window.clipboardData)?.getData('text/plain')||'';
  if(!text || (!text.includes('\n')&&!text.includes('\t')))return true;
  evt.preventDefault();
  syncBatchRowsFromDom();
  const startRow=Math.max(0,batchRows.findIndex(r=>r.rowId===Number(rowId)));
  const startCol=Math.max(0,batchColumnOrder.indexOf(field));
  const lines=text.replace(/\r/g,'').split('\n');
  if(lines.length&&lines[lines.length-1]==='')lines.pop();
  const matrix=lines.map(line=>line.split('\t'));
  while(batchRows.length<startRow+matrix.length)addBatchRowNoRender();
  matrix.forEach((cols,ri)=>{
    cols.forEach((cell,ci)=>{
      const f=batchColumnOrder[startCol+ci];
      if(!f)return;
      batchRows[startRow+ri][f]=normalizeBatchFieldValue(f,cell);
    });
  });
  render();
  showToast(`已從 Excel 貼上 ${matrix.length} 列資料`);
  return false;
}

function isDownloadOnly(c){return c&&downloadOnlyItems.includes(c.item)}function flattenPayments(){let rows=[];activePayments().forEach(b=>b.details.forEach((d,i)=>rows.push({...d,batchId:b.id,batchDate:b.date,payer:b.payer,accountId:b.accountId,fee:i===0?b.fee:0,confirmed:b.confirmed,confirmedSeq:b.confirmedSeq,key:`${b.id}|${d.caseId}`})));return rows}

function findPaymentByCase(caseId){const paid=flattenPayments().find(p=>p.caseId===caseId);if(paid)return paid;const c=getCase(caseId);if(c&&isOnsite(c)){c.fax=c.fax||{};return {...c.fax,caseId,batchDate:c.onsiteDate||c.applicationDate||'',card:('card' in c.fax)?c.fax.card:true,sheetCount:c.fax.sheetCount||1,receiptNo:c.fax.receiptNo||'',handlerCode:c.fax.handlerCode||'',outerCode:c.fax.outerCode||'',oldCard:!!c.fax.oldCard}}return null}
function isOnsite(c){return !!(c&&c.onsite)}
function isCancelItem(item){return cancelItems.includes(item)}

function cancelStatusLabel(c){if(isPaymentCanceled(c))return '取消繳費'; if(c&&isCancelItem(c.item))return '取消申請'; return ''}
function isCanceled(c){return !!(c&&(isCancelItem(c.item)||isPaymentCanceled(c)))}

function pickupStatus(c){if(!c)return 'WAIT'; if(isCanceled(c))return 'CANCEL'; if(isDownloadOnly(c)&&isPaid(c.id))return 'DONE'; return c.pickupStatus||(c.pickedUp?'PICKED':'WAIT')}

function statusPay(c){if(isPaymentCanceled(c))return '<span class="status red">取消繳費</span>'; if(c&&isCancelItem(c.item))return '<span class="status gray">取消申請</span>'; if(isOnsite(c))return '<span class="status blue">現場送件</span>'; return isPaid(c.id)?'<span class="status green">已繳款</span>':'<span class="status orange">待繳款</span>'}
function statusPickup(c){if(isCanceled(c))return '<span class="status gray">'+cancelStatusLabel(c)+'</span>'; if(!isPaid(c.id))return '<span class="status gray">未繳費</span>'; if(isDownloadOnly(c))return '<span class="status purple">請至移民署線上下載居留證</span>'; const st=pickupStatus(c); if(st==='PICKED')return '<span class="status green">已領件</span>'; if(st==='HOLD')return '<span class="status orange">暫緩領件</span>'; if(st==='ISSUE')return '<span class="status red">異常/需確認</span>'; return '<span class="status blue">待領件</span>'}

function nextSequentialId(prefix,list){let max=0;(list||[]).forEach(x=>{const id=String(x&&x.id||'');if(id.startsWith(prefix)){const tail=id.slice(prefix.length);if(/^\d+$/.test(tail))max=Math.max(max,parseInt(tail,10)||0)}});return prefix+String(max+1).padStart(3,'0')}

  saveState();

}

function renderPayment(){const unpaid=activeCases().filter(c=>!isPaid(c.id)&&!isCanceled(c)); const filteredUnpaid=filterPaymentCaseRows(unpaid); const canceledRows=canceledCases().filter(c=>isPaymentCanceled(c)).sort((a,b)=>String(b.paymentCancelAt||'').localeCompare(String(a.paymentCancelAt||''))).slice(0,20); const selectedAgency=selectedPayAgencyId(); const agencySet=selectedAgency?new Set([selectedAgency]):new Set(); const recentStatus=(paymentViewState&&paymentViewState.recentStatus)||'PENDING'; const recentBatches=filterRecentPaymentBatches(activePayments()).slice(0,8); if(selectedAgency&&(!paymentCommon.accountId||getAccount(paymentCommon.accountId)?.agencyId!==selectedAgency)){paymentCommon.accountId=firstAccountIdForAgency(selectedAgency)||paymentCommon.accountId} return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>選擇要繳費案件</h2><p class="hint">待繳案件已依仲介分開顯示；不同仲介不可同一批繳費，請分開建立批次。未繳案件可點選「取消繳費」，需填原因，案件會保留但金額不計入統計。</p></div><div class="chips"><span class="chip">手續費預設 ${state.defaultFee}</span><span class="chip warn">乾坤/灃禾先問財務</span><span class="chip">目前勾選：${selectedAgency?getAgency(selectedAgency).short:'尚未選擇仲介'}</span></div></div><div class="row"><div class="field wide"><label>搜尋待繳案件</label><input value="${esc(paymentViewState.caseQ||'')}" oninput="paymentViewState.caseQ=this.value;render()" placeholder="輸入雇主、工人名、團號或案件編號"></div><div class="field small"><label>待繳總筆數</label><input value="${unpaid.length} 筆" disabled></div><div class="field small"><label>目前顯示</label><input value="${filteredUnpaid.length} 筆" disabled></div></div><div class="toolbar"><button class="btn primary" onclick="selectVisiblePaymentCases()">一鍵勾選目前顯示</button><button class="btn ghost" onclick="clearSelectedPayCases()">一鍵取消勾選</button></div><div class="hint">案件量多時，待繳案件區塊可上下滑動查看。若目前顯示包含不同仲介，請使用各仲介區塊內的一鍵勾選。</div>${renderCaseSelectTable(filteredUnpaid)}</div><div class="card span-12"><h2>本次繳費批次</h2><div class="row"><div class="field small"><label>繳費日期</label><input id="payDate" type="date" value="${paymentCommon.date}"></div><div class="field small"><label>繳款人</label><select id="payPayer">${handlerOptions(paymentCommon.payer)}</select></div><div class="field mid"><label>扣款帳號</label><select id="payAccount">${accountOptions(paymentCommon.accountId,agencySet)}</select></div><div class="field tiny"><label>手續費</label><input id="payFee" type="number" value="${paymentCommon.fee}"></div></div>${renderPaymentDraft()}<div class="toolbar"><button class="btn success" onclick="savePaymentBatch()">儲存繳費批次</button></div></div><div class="card span-12"><div class="section-title"><div><h2>最近繳費批次</h2><p class="hint">預設隱藏財務已確認批次；可用篩選打開查看。</p></div><div class="toolbar"><select class="table-input" onchange="paymentViewState.recentStatus=this.value;render()"><option value="PENDING" ${recentStatus==='PENDING'?'selected':''}>待財務確認</option><option value="CONFIRMED" ${recentStatus==='CONFIRMED'?'selected':''}>財務已確認</option><option value="ALL" ${recentStatus==='ALL'?'selected':''}>全部批次</option></select></div></div>${renderPaymentBatches(recentBatches,false)}</div><div class="card span-12"><div class="section-title"><div><h2>取消繳費紀錄</h2><p class="hint">取消繳費案件會保留在系統與操作紀錄中，不會進入待繳、待領，也不會計入金額統計。</p></div><span class="chip warn">目前 ${canceledRows.length} 筆</span></div>${renderCanceledPaymentTable(canceledRows)}</div></div>`}
function renderCaseSelectTable(rows){if(!rows.length)return '<div class="empty">目前沒有符合的待繳案件</div>';const agencyOrder=activeAgencies().map(a=>a.id);const extra=[...new Set(rows.map(c=>c.agencyId).filter(id=>!agencyOrder.includes(id)))];const ids=[...agencyOrder,...extra].filter(id=>rows.some(c=>c.agencyId===id));return `<div class="payment-case-scroll"><div class="payment-agency-groups">${ids.map(agencyId=>{const ag=getAgency(agencyId);const list=rows.filter(c=>c.agencyId===agencyId);const selectedCount=list.filter(c=>selectedToPay.has(c.id)).length;return `<div class="payment-card"><div class="payment-head"><div><strong>${esc(ag.short||agencyId)}</strong><div class="small-text">待繳案件 ${list.length} 筆｜已勾選 ${selectedCount} 筆</div></div><div class="toolbar"><button class="btn primary" onclick="selectPayAgencyCases('${agencyId}')">一鍵勾選本仲介</button><button class="btn ghost" onclick="clearPayAgencyCases('${agencyId}')">一鍵取消本仲介</button><span class="chip">${esc(ag.name||'')}</span></div></div><div class="divider"></div><div class="table-wrap"><table><thead><tr><th></th><th>案件編號</th><th>團號</th><th>承辦</th><th>雇主</th><th>工人</th><th>入境日</th><th>申請項目</th><th class="right">應繳金額</th><th>操作</th></tr></thead><tbody>${list.map(c=>`<tr><td><input type="checkbox" ${selectedToPay.has(c.id)?'checked':''} onchange="togglePay('${c.id}',this.checked)"></td><td>${c.id}</td><td>${esc(c.groupNo||'')}</td><td>${esc(c.handler)}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.entryDate||''}</td><td>${esc(c.item)}</td><td class="right money">${money(c.amount)}</td><td><button class="btn danger" onclick="cancelPaymentCase('${c.id}')">取消繳費</button></td></tr>`).join('')}</tbody></table></div></div>`}).join('')}</div></div>`}
function togglePay(id,on){const c=getCase(id);if(!c)return;if(on){const selectedAgency=selectedPayAgencyId();if(selectedAgency&&selectedAgency!==c.agencyId){showToast('不同仲介不可一起繳費，請先儲存或取消目前勾選的批次');render();return}selectedToPay.add(id);if(!paymentDraft[id])paymentDraft[id]={amount:c.amount,receiptNo:'',sheetCount:1};paymentCommon.accountId=firstAccountIdForAgency(c.agencyId)||paymentCommon.accountId}else{selectedToPay.delete(id);delete paymentDraft[id]}if([...selectedToPay].some(cid=>['WC','FC'].includes(getCase(cid)?.agencyId)))showToast('乾坤、灃禾繳費前請先與財務確認');render()}
function visiblePaymentCases(){const unpaid=activeCases().filter(c=>!isPaid(c.id)&&!isCanceled(c));return filterPaymentCaseRows(unpaid)}
function selectVisiblePaymentCases(){const rows=visiblePaymentCases();if(!rows.length){showToast('目前沒有可勾選的待繳案件');return}const selectedAgency=selectedPayAgencyId();const agencies=[...new Set(rows.map(c=>c.agencyId).filter(Boolean))];let targetAgency=selectedAgency;if(!targetAgency){if(agencies.length>1){showToast('目前顯示包含不同仲介，請使用各仲介的一鍵勾選');return}targetAgency=agencies[0]}selectPayAgencyCases(targetAgency)}
function selectPayAgencyCases(agencyId){const selectedAgency=selectedPayAgencyId();if(selectedAgency&&selectedAgency!==agencyId){showToast('不同仲介不可一起繳費，請先儲存或取消目前勾選的批次');return}const rows=visiblePaymentCases().filter(c=>c.agencyId===agencyId);if(!rows.length){showToast('此仲介目前沒有可勾選的待繳案件');return}rows.forEach(c=>{selectedToPay.add(c.id);if(!paymentDraft[c.id])paymentDraft[c.id]={amount:c.amount,receiptNo:'',sheetCount:1}});paymentCommon.accountId=firstAccountIdForAgency(agencyId)||paymentCommon.accountId;if(rows.some(c=>['WC','FC'].includes(c.agencyId)))showToast('乾坤、灃禾繳費前請先與財務確認');showToast(`已勾選 ${getAgency(agencyId).short||agencyId} ${rows.length} 筆`);render()}

function renderPaymentDraft(){const ids=[...selectedToPay]; if(!ids.length)return '<div class="empty">尚未勾選案件</div>';const agencyId=selectedPayAgencyId();return `<div class="note-box" style="margin-bottom:10px">本批次仲介：<strong>${agencyId?getAgency(agencyId).short:'未指定'}</strong>。不同仲介不可一起繳費；不同仲介仍可一起傳真與領件。</div><div class="table-wrap"><table><thead><tr><th>仲介別</th><th>雇主</th><th>工人</th><th>入境日</th><th>申請項目</th><th>收件號</th><th class="right">繳費金額</th><th>張數</th></tr></thead><tbody>${ids.map(id=>{const c=getCase(id),d=paymentDraft[id]||{amount:c.amount,receiptNo:'',sheetCount:1};return `<tr><td>${getAgency(c.agencyId).short}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.entryDate||''}</td><td>${esc(c.item)}</td><td><input class="table-input long" value="${esc(d.receiptNo)}" onchange="draftUpdate('${id}','receiptNo',this.value)"></td><td class="right"><input class="table-input money" type="number" value="${d.amount}" onchange="draftUpdate('${id}','amount',this.value)"></td><td><input class="table-input short" type="number" value="${d.sheetCount}" onchange="draftUpdate('${id}','sheetCount',this.value)"></td></tr>`}).join('')}</tbody></table></div><div class="summary-line"><span>本次案件金額</span><strong class="money">${money(ids.reduce((s,id)=>s+num(paymentDraft[id]?.amount||getCase(id).amount),0))}</strong></div>`}

function cancelPaymentCase(id){const c=getCase(id);if(!c)return;if(isPaid(id)){showToast('已繳費案件不可在此取消繳費');return}if(isCanceled(c)){showToast('此案件已取消');return}const reason=prompt(`請輸入取消繳費原因\n${c.employer||''}｜${c.worker||''}`,'');if(reason===null)return;const text=String(reason||'').trim();if(!text){showToast('取消原因不可空白');return}const before=clone(c);c.paymentCanceled=true;c.paymentCancelReason=text;c.paymentCancelAt=nowText();c.paymentCancelBy=currentOperator();c.pickupStatus='CANCEL';selectedToPay.delete(id);delete paymentDraft[id];createAudit('取消繳費','case',id,before,clone(c),'取消原因：'+text,false);saveState();render();showToast('已取消繳費，案件已保留於取消案件統計')}

function savePaymentBatch(){const ids=[...selectedToPay];if(!ids.length){showToast('請先勾選案件');return}const agencyIds=[...new Set(ids.map(id=>getCase(id)?.agencyId).filter(Boolean))];if(agencyIds.length!==1){showToast('不同仲介不可一起繳費，請分開建立批次');return}paymentCommon={date:payDate.value,payer:payPayer.value,accountId:payAccount.value,fee:num(payFee.value)}; if(!paymentCommon.accountId){showToast('請選扣款帳號');return}const accountAgency=(getAccount(paymentCommon.accountId)||{}).agencyId;if(accountAgency!==agencyIds[0]){showToast('扣款帳號需與本批次仲介一致');return}const changedCases=[];const b={id:newPaymentId(paymentCommon.date,agencyIds[0]),date:paymentCommon.date,payer:paymentCommon.payer,accountId:paymentCommon.accountId,fee:paymentCommon.fee,confirmed:false,confirmedSeq:0,details:ids.map(id=>{const c=getCase(id),d=paymentDraft[id]||{}; const before=clone(c); if(isDownloadOnly(c))c.pickupStatus='DONE'; else c.pickupStatus='WAIT'; changedCases.push({id,before,after:clone(c)}); return {caseId:id,amount:num(d.amount||c.amount),receiptNo:d.receiptNo||'',card:true,sheetCount:num(d.sheetCount)||1,handlerCode:'',outerCode:'',oldCard:false,responsible:c.handler}})};state.payments.unshift(b);createAudit('新增繳費批次','payment',b.id,null,b,'選案繳費建立批次',false);changedCases.forEach(x=>createAudit('修改','case',x.id,x.before,x.after,'繳費後更新案件領件狀態',false));saveState();selectedToPay.clear();paymentDraft={};render();showToast('已儲存繳費批次')}
function renderAccounting(){const status=accountingState.status;const batches=activePayments().filter(b=>status==='ALL'||(status==='PENDING'&&!b.confirmed)||(status==='CONFIRMED'&&b.confirmed));return `<div class="grid"><div class="card span-12"><h2>帳戶餘額</h2><p class="hint">帳戶餘額放在會計頁最上方，會計確認後依批次自動扣除。</p><div class="three-col">${activeAgencies().map(a=>`<div class="stat-card"><div class="small-text">${a.name}</div><div class="big">${a.short}</div><div class="summary-line"><span>餘額合計</span><strong class="money">${money(totalBalanceByAgency(a.id))}</strong></div></div>`).join('')}</div></div>${renderBalanceAdjustmentPanel()}<div class="card span-12"><div class="section-title"><div><h2>會計確認</h2><p class="hint">預設隱藏財務已確認批次；可用篩選切換顯示。明細含入境日期；不顯示經手人、外字五碼、舊卡資訊。</p></div><div class="toolbar"><select class="table-input" onchange="accountingState.status=this.value;render()"><option value="PENDING" ${status==='PENDING'?'selected':''}>待財務確認</option><option value="CONFIRMED" ${status==='CONFIRMED'?'selected':''}>財務已確認</option><option value="ALL" ${status==='ALL'?'selected':''}>全部批次</option></select><button class="btn ghost" onclick="setPage('accountingQuery')">依日期查詢</button><button class="btn success" onclick="confirmSelectedAccounting()">確認選取批次</button></div></div>${renderPaymentBatches(batches,true)}</div></div>`}
function canAdjustBalance(){return isAdmin()||isAccounting()}
function renderBalanceAdjustmentPanel(){if(!canAdjustBalance())return '';const rows=activeAccounts();return `<div class="card span-12"><div class="section-title"><div><h2>帳戶餘額調整</h2><p class="hint">會計與管理員可修改餘額。儲存後會以輸入金額作為新基準，後續會計確認的批次會再繼續扣除。</p></div><span class="chip warn">會留下操作紀錄</span></div><div class="table-wrap"><table><thead><tr><th>仲介別</th><th>銀行</th><th>帳號</th><th class="right">目前餘額</th><th>調整後餘額</th><th>操作</th></tr></thead><tbody>${rows.map(ac=>{const ag=getAgency(ac.agencyId);const bal=balanceForAccount(ac.id);return `<tr><td>${ag.short}</td><td>${esc(ac.bank)} ${esc(ac.code)}</td><td><span class="copy-chip" onclick="copyText('${esc(ac.number)}')">${esc(ac.number)}</span></td><td class="right money">${money(bal)}</td><td><input class="table-input money" id="bal_${ac.id}" type="number" value="${bal}"></td><td><button class="btn success" onclick="saveAccountBalance('${ac.id}')">儲存餘額</button></td></tr>`}).join('')}</tbody></table></div></div>`}
function saveAccountBalance(accountId){if(!canAdjustBalance()){showToast('沒有權限調整餘額');return}const ac=getAccount(accountId);if(!ac)return;const input=document.getElementById('bal_'+accountId);const newBalance=num(input?input.value:0);const before=clone(ac);ac.baseBalance=newBalance;ac.balanceEditedSeq=state.seq.confirm||0;ac.lastBalanceEditedAt=nowText();ac.lastBalanceEditedBy=currentOperator();createAudit('修改','account',accountId,before,clone(ac),'會計調整帳戶餘額',false);saveState();render();showToast('已更新帳戶餘額')}
function renderPaymentBatches(batches,selectable){if(!batches.length)return '<div class="empty">尚無繳費批次</div>';return batches.map(b=>{const ac=getAccount(b.accountId)||{},ag=getAgency(ac.agencyId);return `<div class="payment-card"><div class="payment-head"><div>${selectable&&!b.confirmed?`<input type="checkbox" ${selectedAccounting.has(b.id)?'checked':''} onchange="toggleAccounting('${b.id}',this.checked)">`:''} <strong>${b.id}</strong>　${statusConfirm(b)}<div class="small-text">${b.date}｜${ag.short||''}｜${ac.bank||''}${ac.code||''}｜繳款人：${b.payer}</div></div><div class="right"><div class="small-text">批次總額</div><strong class="money">${money(batchTotal(b))}</strong>${isAdmin()?`<div class="toolbar"><button class="btn danger" onclick="deletePaymentBatch('${b.id}')">刪除批次</button></div>`:''}</div></div><div class="divider"></div><div class="table-wrap"><table><thead><tr><th>仲介別</th><th>雇主</th><th>工人</th><th>入境日</th><th>收件號</th><th>申請項目</th><th class="right">金額</th></tr></thead><tbody>${b.details.map(d=>{const c=getCase(d.caseId)||{};return `<tr><td>${getAgency(c.agencyId).short}</td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${c.entryDate||''}</td><td>${esc(d.receiptNo||'')}</td><td>${esc(c.item||'')}</td><td class="right money">${money(d.amount)}</td></tr>`}).join('')}<tr><td colspan="6" class="right">手續費</td><td class="right money">${money(b.fee)}</td></tr></tbody></table></div></div>`}).join('')}
function toggleAccounting(id,on){on?selectedAccounting.add(id):selectedAccounting.delete(id)}
function confirmSelectedAccounting(){let n=0;activePayments().forEach(b=>{if(selectedAccounting.has(b.id)&&!b.confirmed){const before=clone(b);state.seq.confirm+=1;b.confirmed=true;b.confirmedSeq=state.seq.confirm;createAudit('修改','payment',b.id,before,clone(b),'會計確認批次',false);n++}});selectedAccounting.clear();saveState();render();showToast(`已確認 ${n} 筆批次`)}
function payDateForCase(c){const p=findPaymentByCase(c.id)||{};return p.batchDate||c.onsiteDate||c.applicationDate||''}
function compareFaxRows(a,b){const da=payDateForCase(a)||'',db=payDateForCase(b)||'';if(da!==db)return da.localeCompare(db,'zh-Hant');const pa=findPaymentByCase(a.id)||{},pb=findPaymentByCase(b.id)||{};return String(pa.receiptNo||'').localeCompare(String(pb.receiptNo||''),'zh-Hant',{numeric:true})||String(pa.outerCode||'').localeCompare(String(pb.outerCode||''),'zh-Hant',{numeric:true})||String(a.id||'').localeCompare(String(b.id||''),'zh-Hant',{numeric:true})}
function faxRowsEligible(){return activeCases().filter(c=>needsPickup(c)).sort(compareFaxRows)}
function totalSheets(rows){return rows.reduce((sum,c)=>sum+num((findPaymentByCase(c.id)||{}).sheetCount||1),0)}
function compareSignRows(a,b){const aa=a.adminCategory||a.handler||'',bb=b.adminCategory||b.handler||'';return String(aa).localeCompare(String(bb),'zh-Hant',{numeric:true})||String(a.employer||'').localeCompare(String(b.employer||''),'zh-Hant',{numeric:true})||String(a.worker||'').localeCompare(String(b.worker||''),'zh-Hant',{numeric:true})||compareFaxRows(a,b)}
function sheetsByAdmin(rows,admin){return totalSheets(rows.filter(c=>(c.adminCategory||c.handler||'')===admin))}

function dateObj(dateStr){const parts=String(dateStr||today).split('-').map(Number);return new Date(parts[0]||2026,(parts[1]||1)-1,parts[2]||1)}
function ymd(d){const x=d instanceof Date?d:dateObj(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`}
function addDaysToDate(dateStr,days){const d=dateObj(dateStr);d.setDate(d.getDate()+days);return ymd(d)}
function defaultPickupDate(anchorDate=today){const d=dateObj(anchorDate);const day=d.getDay();const diff=day<=1?4-day:11-day;d.setDate(d.getDate()+diff);return ymd(d)}
function nextPickupDateAfter(dateStr){return defaultPickupDate(addDaysToDate(dateStr||today,1))}
function currentFaxPickupDate(){if(!faxViewState.pickupDate)faxViewState.pickupDate=defaultPickupDate(today);return faxViewState.pickupDate}
function setFaxPickupDate(v){faxViewState.pickupDate=v||defaultPickupDate(today);render()}
function pendingFaxQueue(){normalizeState(state);return (state.faxQueue||[]).filter(q=>!isDeletedRecord(q)&&q.status==='待領件')}
function faxQueueItem(caseId){return pendingFaxQueue().find(q=>q.caseId===caseId)}
function isFaxCaseSelected(caseId){return selectedFax.has(caseId)||!!faxQueueItem(caseId)}
function faxDetailReady(caseId){const p=findPaymentByCase(caseId)||{};return !!(String(p.receiptNo||'').trim()&&String(p.outerCode||'').trim()&&String(p.receiptOrder||'').trim())}
function buildFaxQueueItem(caseId,pickupDate){const c=getCase(caseId),p=findPaymentByCase(caseId)||{};if(!c)return null;return {caseId:c.id,agencyId:c.agencyId,handler:c.handler,receiptNo:p.receiptNo||'',outerCode:p.outerCode||'',receiptOrder:String(p.receiptOrder||'').replace(/\D/g,''),faxDate:today,paymentDate:payDateForCase(c),expectedPickupDate:pickupDate||defaultPickupDate(today),status:'待領件',createdAt:nowText(),createdBy:currentOperator(),employer:c.employer,worker:c.worker,item:c.item,groupNo:c.groupNo,entryDate:c.entryDate,sheetCount:p.sheetCount||1,handlerCode:p.handlerCode||'',oldCard:!!p.oldCard,card:p.card!==false}}
function upsertFaxQueue(caseId,pickupDate){normalizeState(state);const item=buildFaxQueueItem(caseId,pickupDate);if(!item)return false;const idx=(state.faxQueue||[]).findIndex(q=>q.caseId===caseId&&q.status==='待領件'&&!isDeletedRecord(q));if(idx>=0)state.faxQueue[idx]={...state.faxQueue[idx],...item,expectedPickupDate:pickupDate||state.faxQueue[idx].expectedPickupDate||item.expectedPickupDate,updatedAt:nowText(),updatedBy:currentOperator()};else state.faxQueue.push(item);selectedFax.add(caseId);return true}
function removeFaxQueue(caseId,note='取消勾選或必要欄位清空'){normalizeState(state);let removed=false;(state.faxQueue||[]).forEach(q=>{if(q.caseId===caseId&&q.status==='待領件'&&!isDeletedRecord(q)){q.deletedAt=nowText();q.deletedBy=currentOperator();q.deleteReason=note;removed=true}});selectedFax.delete(caseId);return removed}
function toggleFax(id,on){if(on){if(!faxDetailReady(id)){selectedFax.delete(id);showToast('請先補齊收件編號、外字末五碼與收據順序，才能加入預計領件區');render();return}upsertFaxQueue(id,defaultPickupDate(today));saveState();showToast('已加入預計領件區')}else{removeFaxQueue(id,'取消勾選');saveState();showToast('已從預計領件區移除')}render()}
function togglePickup(id,on){on?selectedPickup.add(id):selectedPickup.delete(id);render()}
function selectAllFax(){const rows=faxRowsEligible();let ok=0,skip=0;rows.forEach(c=>{if(faxDetailReady(c.id)){upsertFaxQueue(c.id,defaultPickupDate(today));ok++}else skip++});saveState();render();showToast(`已加入 ${ok} 筆至預計領件區${skip?`，${skip} 筆缺收件編號/外字末五碼/收據順序`:''}`)}
function clearFaxSelection(){const n=pendingFaxQueue().length;pendingFaxQueue().forEach(q=>removeFaxQueue(q.caseId,'一鍵取消勾選'));selectedFax.clear();saveState();render();showToast(`已取消 ${n} 筆傳真領件勾選`)}
function selectWaitingFax(){const rows=faxRowsEligible().filter(c=>needsPickup(c));let ok=0,skip=0;rows.forEach(c=>{if(faxDetailReady(c.id)){upsertFaxQueue(c.id,defaultPickupDate(today));ok++}else skip++});saveState();render();showToast(`已加入待領件 ${ok} 筆${skip?`，${skip} 筆資料未齊`:''}`)}
function selectAllPickup(){faxRowsEligible().forEach(c=>selectedPickup.add(c.id));render();showToast('已全選領件維護資料')}
function clearPickupSelection(){selectedPickup.clear();render();showToast('已取消領件維護勾選')}
function queueRowsForSelectedPickupDate(){const d=currentFaxPickupDate();return pendingFaxQueue().filter(q=>q.expectedPickupDate===d).sort((a,b)=>String(a.receiptOrder||'').localeCompare(String(b.receiptOrder||''),'zh-Hant',{numeric:true})||String(a.receiptNo||'').localeCompare(String(b.receiptNo||''),'zh-Hant',{numeric:true}))}
function updateQueuePickupDate(caseId,newDate){const q=faxQueueItem(caseId);if(!q)return;const before=clone(q);q.expectedPickupDate=newDate||defaultPickupDate(today);q.updatedAt=nowText();q.updatedBy=currentOperator();createAudit('修改','pickup',caseId,before,clone(q),'修改預計領件日',false);saveState();render();showToast('已更新預計領件日')}
function renderFax(){const rows=faxRowsEligible();const queuedRows=queueRowsForSelectedPickupDate();const selectedCount=pendingFaxQueue().length;const selectedSheets=queuedRows.reduce((s,q)=>s+num(q.sheetCount||1),0);return `<div class="grid"><div class="card span-12"><div class="section-title"><div><h2>移民署傳真領件</h2><p class="hint">勾選案件前，請先補齊收件編號、外字末五碼與收據順序。不同仲介可一起傳真與領件。</p></div><div class="toolbar"><button class="btn primary" onclick="selectAllFax()">一鍵全選</button><button class="btn ghost" onclick="clearFaxSelection()">取消勾選</button><button class="btn" onclick="selectWaitingFax()">勾選待領件</button><button class="btn ghost" onclick="exportFaxSelected()">匯出預計領件區</button></div></div><div class="selected-summary"><span class="chip">預計領件區 ${selectedCount} 筆</span><span class="chip warn">目前領件日張數 ${selectedSheets}</span><span class="chip">收據順序會列印</span></div><div class="table-wrap"><table><thead><tr><th></th><th>收費日期</th><th>收件編號</th><th>IC卡</th><th>張數</th><th>經手人四碼</th><th>外字末五碼</th><th>舊卡</th><th>雇主名稱</th><th>工人名稱</th><th>承辦</th><th>收據順序</th></tr></thead><tbody>${rows.map(c=>{const p=findPaymentByCase(c.id)||{};const checked=isFaxCaseSelected(c.id);return `<tr><td><input type="checkbox" ${checked?'checked':''} onchange="toggleFax('${c.id}',this.checked)"></td><td>${payDateForCase(c)}</td><td><input class="table-input long" value="${esc(p.receiptNo||'')}" onchange="updateDetail('${c.id}','receiptNo',this.value)"></td><td><input type="checkbox" ${p.card!==false?'checked':''} onchange="updateDetail('${c.id}','card',this.checked)"></td><td><input class="table-input short" type="number" value="${p.sheetCount||1}" onchange="updateDetail('${c.id}','sheetCount',this.value)"></td><td><input class="table-input short" value="${esc(p.handlerCode||'')}" maxlength="4" onchange="updateDetail('${c.id}','handlerCode',this.value)"></td><td><input class="table-input short" value="${esc(p.outerCode||'')}" maxlength="5" onchange="updateDetail('${c.id}','outerCode',this.value)"></td><td><input type="checkbox" ${p.oldCard?'checked':''} onchange="updateDetail('${c.id}','oldCard',this.checked)"></td><td>${esc(c.employer)}</td><td>${esc(c.worker)}</td><td>${esc(c.handler)}${isOnsite(c)?' <span class="onsite-badge">現場</span>':''}</td><td><input class="table-input short" type="number" min="1" value="${esc(p.receiptOrder||'')}" onchange="updateDetail('${c.id}','receiptOrder',this.value)"></td></tr>`}).join('')}</tbody></table></div></div><div class="card span-12">${renderExpectedPickupSection(queuedRows)}</div><div class="card span-12">${renderFaxRecordsSection()}</div></div>`}
function updateDetail(caseId,field,value){const d=paymentDetailRef(caseId);if(!d){showToast('找不到明細');return}const before=clone(d);if(field==='sheetCount')d[field]=Math.max(1,num(value)||1);else if(field==='card'||field==='oldCard')d[field]=!!value;else if(field==='handlerCode')d[field]=String(value||'').replace(/\D/g,'').slice(0,4);else if(field==='outerCode')d[field]=String(value||'').replace(/\D/g,'').slice(-5);else if(field==='receiptOrder')d[field]=String(value||'').replace(/\D/g,'');else d[field]=value;createAudit('修改','paymentDetail',caseId,before,clone(d),'修改傳真/繳費明細欄位：'+field,false);if(isFaxCaseSelected(caseId)){if(faxDetailReady(caseId)){const q=faxQueueItem(caseId);upsertFaxQueue(caseId,q?q.expectedPickupDate:defaultPickupDate(today))}else{removeFaxQueue(caseId,'必要欄位清空')}}saveState();render()}
function renderExpectedPickupSection(rows){const d=currentFaxPickupDate();return `<div class="section-title"><div><h2>預計領件區</h2><p class="hint">只顯示目前領件日的待領件資料。完成產生傳真領件紀錄後，本區該領件日資料會清空並保留於紀錄中。</p></div><div class="toolbar"><div class="field small" style="min-width:180px"><label>領件日</label><input type="date" value="${d}" onchange="setFaxPickupDate(this.value)"></div><button class="btn success" onclick="createFaxPickupRecord(true)">建立紀錄並列印</button></div></div>${rows.length?`<div class="pickup-zone"><div class="fax-meta"><span class="chip">領件日 ${d}</span><span class="chip warn">案件 ${rows.length} 筆</span><span class="chip">狀態：待領件</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>承辦</th><th>收件編號</th><th>外字末五碼</th><th>收據順序</th><th>工人姓名</th><th>雇主名稱</th><th>申請項目</th><th>傳真日期</th><th>預計領件日</th><th>操作</th></tr></thead><tbody>${rows.map((q,i)=>`<tr><td>${i+1}</td><td>${esc(q.handler)}</td><td>${esc(q.receiptNo)}</td><td>${esc(q.outerCode)}</td><td class="center strong">${esc(q.receiptOrder)}</td><td>${esc(q.worker)}</td><td>${esc(q.employer)}</td><td>${esc(q.item)}</td><td>${esc(q.faxDate)}</td><td><input class="table-input date" type="date" value="${esc(q.expectedPickupDate)}" onchange="updateQueuePickupDate('${q.caseId}',this.value)"></td><td><button class="btn success" onclick="createSingleFaxPickupRecord('${q.caseId}',true)">單筆領件</button><button class="btn ghost" onclick="toggleFax('${q.caseId}',false)">移除</button></td></tr>`).join('')}</tbody></table></div></div>`:'<div class="empty">目前領件日沒有待領件資料</div>'}`}
function newFaxRecordId(pickupDate){const prefix='P'+String(pickupDate||today).replaceAll('-','');const count=(state.faxRecords||[]).filter(r=>String(r.id||'').startsWith(prefix)).length+1;return `${prefix}-${String(count).padStart(2,'0')}`}
function createFaxPickupRecord(printAfter){const rows=queueRowsForSelectedPickupDate();if(!rows.length){showToast('目前領件日沒有可產生的預計領件資料');return}createFaxPickupRecordFromRows(rows,currentFaxPickupDate(),printAfter,'批次領件')}
function createSingleFaxPickupRecord(caseId,printAfter){const q=faxQueueItem(caseId);if(!q){showToast('找不到預計領件資料');return}createFaxPickupRecordFromRows([q],q.expectedPickupDate||currentFaxPickupDate(),printAfter,'單筆領件')}
function createFaxPickupRecordFromRows(rows,pickupDate,printAfter,mode){rows=(rows||[]).filter(Boolean);if(!rows.length){showToast('沒有可產生的領件資料');return}const id=newFaxRecordId(pickupDate);const record={id,pickupDate,createdDate:today,createdAt:nowText(),createdBy:currentOperator(),caseCount:rows.length,mode:mode||'領件',details:rows.map((q,i)=>({...clone(q),paymentDate:q.paymentDate||payDateForCase(q.caseId),seq:i+1,status:'已領件'}))};state.faxRecords=state.faxRecords||[];state.faxRecords.unshift(record);rows.forEach(q=>{const c=getCase(q.caseId);if(c){const before=clone(c);c.pickupStatus='PICKED';c.pickupDate=pickupDate;c.pickupPerson=c.pickupPerson||q.handler;createAudit('修改','pickup',q.caseId,before,clone(c),(mode||'領件')+'完成，更新為已領件',false)}removeFaxQueue(q.caseId,'已產生傳真領件紀錄 '+id)});createAudit('新增','pickup',id,null,clone(record),'建立傳真領件紀錄：'+(mode||'領件'),false);saveState();faxViewState.openRecordId=id;faxViewState.pickupDate=pickupDate;render();if(printAfter)printFaxRecord(id);showToast('已建立傳真領件紀錄 '+id)}
function renderFaxRecordsSection(){const records=state.faxRecords||[];return `<div class="section-title"><div><h2>傳真領件紀錄</h2><p class="hint">每次產生傳真領件單都會建立紀錄；可查看明細，未領到可退回預計領件區。</p></div><span class="chip">共 ${records.length} 筆</span></div>${records.length?`<div class="table-wrap"><table><thead><tr><th>紀錄編號</th><th>領件日期</th><th>建立日期</th><th>建立人</th><th class="right">案件數</th><th>操作</th></tr></thead><tbody>${records.map(r=>`<tr><td><strong>${esc(r.id)}</strong></td><td>${esc(r.pickupDate)}</td><td>${esc(r.createdAt||r.createdDate)}</td><td>${esc(r.createdBy)}</td><td class="right">${r.caseCount||((r.details||[]).length)}</td><td><button class="btn ghost" onclick="toggleFaxRecordDetail('${r.id}')">${faxViewState.openRecordId===r.id?'收合':'查看明細'}</button><button class="btn primary" onclick="printFaxRecord('${r.id}')">列印</button></td></tr>${faxViewState.openRecordId===r.id?`<tr><td colspan="6">${renderFaxRecordDetail(r)}</td></tr>`:''}`).join('')}</tbody></table></div>`:'<div class="empty">尚無傳真領件紀錄</div>'}`}
function toggleFaxRecordDetail(id){faxViewState.openRecordId=faxViewState.openRecordId===id?'':id;render()}
function renderFaxRecordDetail(r){const details=r.details||[];return `<div class="fax-record-detail"><div class="fax-meta"><span class="chip">${esc(r.id)}</span><span class="chip">領件日 ${esc(r.pickupDate)}</span><span class="chip warn">明細 ${details.length} 筆</span></div><div class="table-wrap"><table><thead><tr><th>#</th><th>狀態</th><th>承辦</th><th>收件編號</th><th>外字末五碼</th><th>收據順序</th><th>工人姓名</th><th>雇主名稱</th><th>申請項目</th><th>操作</th></tr></thead><tbody>${details.map((d,i)=>`<tr><td>${i+1}</td><td><span class="status ${d.status==='本次未領到'?'orange':'blue'}">${esc(d.status||'待領件')}</span></td><td>${esc(d.handler)}</td><td>${esc(d.receiptNo)}</td><td>${esc(d.outerCode)}</td><td class="center strong">${esc(d.receiptOrder)}</td><td>${esc(d.worker)}</td><td>${esc(d.employer)}</td><td>${esc(d.item)}</td><td>${d.status==='本次未領到'?'<span class="status gray">已退回</span>':`<button class="btn warn" onclick="markFaxRecordItemNotReceived('${r.id}','${d.caseId}')">本次未領到</button>`}</td></tr>`).join('')}</tbody></table></div></div>`}
function markFaxRecordItemNotReceived(recordId,caseId){const r=(state.faxRecords||[]).find(x=>x.id===recordId);if(!r)return;const d=(r.details||[]).find(x=>x.caseId===caseId);if(!d)return;const before=clone(d);d.status='本次未領到';d.notReceivedAt=nowText();d.notReceivedBy=currentOperator();const nextDate=nextPickupDateAfter(r.pickupDate);upsertFaxQueue(caseId,nextDate);const q=faxQueueItem(caseId);if(q){q.expectedPickupDate=nextDate;q.status='待領件';q.returnedFromRecord=recordId}const c=getCase(caseId);if(c){const cb=clone(c);c.pickupStatus='WAIT';c.pickupDate=nextDate;createAudit('修改','pickup',caseId,cb,clone(c),'本次未領到，退回預計領件區',false)}createAudit('修改','pickup',recordId,before,clone(d),'傳真領件紀錄明細標記本次未領到，案件退回預計領件區',false);faxViewState.pickupDate=nextDate;saveState();render();showToast('已退回預計領件區，預計領件日：'+nextDate)}
function renderFaxPaper(rows,recordId='',pickupDate=''){if(!rows.length)return '<div class="empty">尚無傳真資料</div>';const agencies=[...new Set(rows.map(q=>{const a=getAgency(q.agencyId);return a.name||a.short||q.agencyId||''}).filter(Boolean))].join('、');const phones=[...new Set(rows.map(q=>{const a=getAgency(q.agencyId);return a.phone||''}).filter(Boolean))].join('、')||state.faxAgencyPhone||'';const handlers=[...new Set(rows.map(q=>q.handler).filter(Boolean))].join('、');return `<div class="paper-title">移民署傳真領件清單</div><div class="paper-summary"><span>紀錄編號：${esc(recordId||'未建立')}</span><span>領件日期：${esc(pickupDate||currentFaxPickupDate())}</span><span>本次傳真筆數：${rows.length}</span><span>總張數：${rows.reduce((s,q)=>s+num(q.sheetCount||1),0)}</span></div><div class="table-wrap"><table><thead><tr><th>編號</th><th>收費日期</th><th>收件編號</th><th>IC 卡</th><th>張數</th><th>經手人後四碼</th><th>外字五碼</th><th>雇主</th><th>工人</th><th>承辦</th><th>收據順序</th></tr></thead><tbody>${rows.map((q,i)=>`<tr><td>${i+1}</td><td>${esc(q.paymentDate||payDateForCase(q.caseId)||'')}</td><td>${esc(q.receiptNo)}</td><td class="center">${q.card!==false?'☑':'□'}</td><td class="center">${q.sheetCount||1}</td><td>${esc(q.handlerCode||'')}</td><td>${esc(q.outerCode||'')}</td><td>${esc(q.employer)}</td><td>${esc(q.worker)}</td><td>${esc(q.handler)}</td><td class="center strong">${esc(q.receiptOrder)}</td></tr>`).join('')}</tbody></table></div><div class="fax-footer"><div>仲介名稱：${esc(agencies)}</div><div>電話：${esc(phones)}</div><div>承辦：${esc(handlers)}</div><div>總領件數：${rows.length} 件</div></div>`}
function renderRecordSignPaper(record){const rows=(record.details||[]).filter(d=>d.status!=='本次未領到').sort((a,b)=>String(a.handler||'').localeCompare(String(b.handler||''),'zh-Hant')||String(a.employer||'').localeCompare(String(b.employer||''),'zh-Hant')||String(a.worker||'').localeCompare(String(b.worker||''),'zh-Hant'));if(!rows.length)return '';const handlersUsed=[...new Set(rows.map(q=>q.handler||'未指定'))];return `<div class="sign-paper"><div class="paper-title">居留證領件簽收單</div><div class="paper-summary"><span>紀錄編號：${esc(record.id)}</span><span>領件日：${esc(record.pickupDate)}</span><span>本次領件筆數：${rows.length}</span></div>${handlersUsed.map(h=>{const group=rows.filter(q=>(q.handler||'未指定')===h);return `<div class="sign-handler-block"><h3>承辦：${esc(h)}</h3><div class="table-wrap"><table><thead><tr><th>領件日</th><th>雇主</th><th>工人</th><th>團號</th><th>申請項目</th></tr></thead><tbody>${group.map(q=>`<tr><td>${esc(record.pickupDate||q.expectedPickupDate||'')}</td><td>${esc(q.employer)}</td><td>${esc(q.worker)}</td><td>${esc(q.groupNo||'')}</td><td>${esc(q.item||'')}</td></tr>`).join('')}</tbody></table></div><div class="signature-row"><span>承辦簽名：________________________</span><span>本承辦總領件數：${group.length} 件</span></div></div>`}).join('')}</div>`}
function printFaxRecord(recordId){const record=(state.faxRecords||[]).find(r=>r.id===recordId);if(!record){showToast('找不到傳真領件紀錄');return}const rows=(record.details||[]).filter(d=>d.status!=='本次未領到');printHtml('移民署傳真領件清單 '+record.id,`<div class="print-document">${renderFaxPaper(rows,record.id,record.pickupDate)}<div class="page-break"></div>${renderRecordSignPaper(record)}</div>`)}
